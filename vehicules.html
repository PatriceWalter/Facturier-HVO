<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HVO - Véhicules</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head><body>
<div id="app">
<div id="navContainer"></div>
<div class="app-content">
  <div class="card">
    <div class="card-title">🚗 Gestion des Véhicules <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openVehicleModal()">+ Nouveau véhicule</button></div>
    <div class="search-box"><input id="vehicleSearch" placeholder="Rechercher par plaque, marque..." oninput="renderVehicles()"></div>
    <div class="table-wrap"><table><thead><tr><th>Plaque</th><th>Marque</th><th>Modèle</th><th>Énergie</th><th>Année</th><th>Client</th><th>Actions</th></tr></thead><tbody id="vehiclesTable"></tbody></table></div>
  </div>
</div></div>

<!-- VEHICLE MODAL -->
<div class="modal-overlay" id="vehicleModal">
  <div class="modal" style="max-width:750px">
    <div class="modal-header"><h3 id="vehicleModalTitle">Nouveau véhicule</h3><button class="modal-close" onclick="closeModal('vehicleModal')">&times;</button></div>
    <div class="modal-body">
      <div class="card" style="background:var(--silver-light);margin-bottom:16px">
        <div style="display:flex;gap:8px;align-items:end">
          <div class="form-group" style="flex:1;margin:0"><label>🔍 Recherche par plaque</label><input id="vPlateSearch" placeholder="AA-123-BB" style="text-transform:uppercase;font-weight:700;font-size:1.1em"></div>
          <button class="btn btn-primary" onclick="searchPlate()" style="height:44px">Rechercher</button>
        </div>
        <div id="plateResult" style="margin-top:8px;font-size:.85em;color:var(--text-light)"></div>
      </div>
      <div style="margin-bottom:12px"><button class="btn btn-secondary btn-sm" onclick="toggleAutodoc('veh')">📋 Coller depuis Auto-Doc.fr</button></div>
      <div class="autodoc-panel" id="autodocPanel_veh">
        <p style="font-size:.82em;color:var(--text-light);margin-bottom:8px">Collez le bloc texte copié depuis Auto-Doc.fr :</p>
        <textarea id="autodocText_veh" placeholder="Collez ici..."></textarea>
        <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="parseAutodoc('veh')">✅ Remplir</button>
      </div>
      <div class="form-row"><div class="form-group"><label>Immatriculation *</label><input id="vPlaque" style="text-transform:uppercase;font-weight:700"></div><div class="form-group"><label>VIN</label><input id="vVin" maxlength="17" style="text-transform:uppercase"></div></div>
      <div class="form-row-3">
        <div class="form-group"><label>Marque</label><select id="vMarque" onchange="updateModels('v')"><option value="">--</option></select><input id="vMarqueSearch" placeholder="Filtrer..." oninput="filterCombo('vMarque','vMarqueSearch')" style="margin-top:4px"></div>
        <div class="form-group"><label>Modèle</label><select id="vModele" onchange="updateMotors('v')"><option value="">--</option></select><input id="vModeleSearch" placeholder="Filtrer..." oninput="filterCombo('vModele','vModeleSearch')" style="margin-top:4px"></div>
        <div class="form-group"><label>Motorisation</label><select id="vMotorisation" onchange="autoFillMotor('v')"><option value="">--</option></select></div>
      </div>
      <div class="form-row-4">
        <div class="form-group"><label>Carrosserie</label><input id="vCarrosserie"></div>
        <div class="form-group"><label>Couleur</label><input id="vCouleur"></div>
        <div class="form-group"><label>Énergie</label><select id="vEnergie"><option value="">--</option><option>Diesel</option><option>Essence</option><option>Électrique</option><option>Hybride</option><option>GPL</option><option>Hydrogène</option></select></div>
        <div class="form-group"><label>Boîte</label><select id="vBoite"><option value="">--</option><option>Manuelle</option><option>Automatique</option><option>Robotisée</option></select></div>
      </div>
      <div class="form-row-4">
        <div class="form-group"><label>Année / 1ère MEC</label><input id="vAnnee"></div>
        <div class="form-group"><label>Cylindrée (cc)</label><input id="vCylindree" type="number"></div>
        <div class="form-group"><label>Puissance CV</label><input id="vCV" type="number"></div>
        <div class="form-group"><label>Puissance KW</label><input id="vKW" type="number"></div>
      </div>
      <div class="form-row"><div class="form-group"><label>Kilométrage</label><input id="vKm" type="number"></div><div class="form-group"><label>Client</label><select id="vClient"><option value="">--</option></select></div></div>
      <div class="form-group"><label>Observations</label><textarea id="vObs" rows="2"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('vehicleModal')">Annuler</button><button class="btn btn-primary" onclick="saveVehicle()">💾 Enregistrer</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/data.js"></script><script src="js/shared.js"></script>
<script>
if(!isLoggedIn()){window.location.href='index.html';}
let editingVehicleId=null;
initData(function(){buildNav('vehicules');populateBrandSelect('vMarque');renderVehicles();});

function renderVehicles(){
  const s=(document.getElementById('vehicleSearch')?.value||'').toLowerCase();
  document.getElementById('vehiclesTable').innerHTML=data.vehicles.filter(v=>{
    const cl=data.clients.find(c=>c.id===v.clientId);
    return !s||(v.plaque+' '+v.marque+' '+v.modele+' '+(cl?cl.nom:'')).toLowerCase().includes(s);
  }).map(v=>{
    const cl=data.clients.find(c=>c.id===v.clientId);
    return '<tr><td><strong>'+v.plaque+'</strong></td><td>'+v.marque+'</td><td>'+v.modele+'</td><td>'+(v.energie||'')+'</td><td>'+(v.annee||'')+'</td><td>'+(cl?cl.nom+' '+(cl.prenom||''):'-')+'</td>'
      +'<td><button class="btn btn-primary btn-sm" onclick="editVehicle(\''+v.id+'\')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteVehicle(\''+v.id+'\')">🗑️</button></td></tr>';
  }).join('');
}
function openVehicleModal(id){
  editingVehicleId=id||null;
  document.getElementById('vehicleModalTitle').textContent=id?'Modifier véhicule':'Nouveau véhicule';
  const cSel=document.getElementById('vClient');
  cSel.innerHTML='<option value="">--</option>'+data.clients.map(c=>'<option value="'+c.id+'">'+c.nom+' '+(c.prenom||'')+'</option>').join('');
  if(id){
    const v=data.vehicles.find(x=>x.id===id);if(v){
      document.getElementById('vPlaque').value=v.plaque||'';document.getElementById('vVin').value=v.vin||'';
      setSelectByText('vMarque',v.marque||'');
      setTimeout(()=>{setSelectByText('vModele',v.modele||'');setTimeout(()=>setSelectByText('vMotorisation',v.motorisation||''),100);},100);
      document.getElementById('vCarrosserie').value=v.carrosserie||'';document.getElementById('vCouleur').value=v.couleur||'';
      if(v.energie){for(let o of document.getElementById('vEnergie').options)if(o.text===v.energie)document.getElementById('vEnergie').value=o.value;}
      if(v.boite){for(let o of document.getElementById('vBoite').options)if(o.text===v.boite)document.getElementById('vBoite').value=o.value;}
      document.getElementById('vAnnee').value=v.annee||'';document.getElementById('vCylindree').value=v.cylindree||'';
      document.getElementById('vCV').value=v.cv||'';document.getElementById('vKW').value=v.kw||'';
      document.getElementById('vKm').value=v.km||'';document.getElementById('vClient').value=v.clientId||'';
      document.getElementById('vObs').value=v.observations||'';
    }
  } else {
    ['vPlaque','vVin','vCarrosserie','vCouleur','vAnnee','vCylindree','vCV','vKW','vKm','vObs','vPlateSearch'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
    document.getElementById('vMarque').value='';document.getElementById('vModele').innerHTML='<option value="">--</option>';
    document.getElementById('vMotorisation').innerHTML='<option value="">--</option>';
    document.getElementById('vEnergie').value='';document.getElementById('vBoite').value='';document.getElementById('vClient').value='';
    if(document.getElementById('plateResult'))document.getElementById('plateResult').textContent='';
  }
  openModal('vehicleModal');
}
function editVehicle(id){openVehicleModal(id);}
function saveVehicle(){
  const plaque=document.getElementById('vPlaque').value.trim().toUpperCase();if(!plaque){toast('❌ Plaque obligatoire');return;}
  const obj={plaque,vin:document.getElementById('vVin').value.trim().toUpperCase(),marque:document.getElementById('vMarque').value,modele:document.getElementById('vModele').value,motorisation:document.getElementById('vMotorisation').value,carrosserie:document.getElementById('vCarrosserie').value.trim(),couleur:document.getElementById('vCouleur').value.trim(),energie:document.getElementById('vEnergie').selectedOptions[0]?.text||'',boite:document.getElementById('vBoite').selectedOptions[0]?.text||'',annee:document.getElementById('vAnnee').value.trim(),cylindree:document.getElementById('vCylindree').value,cv:document.getElementById('vCV').value,kw:document.getElementById('vKW').value,km:document.getElementById('vKm').value,clientId:document.getElementById('vClient').value,observations:document.getElementById('vObs').value.trim()};
  if(editingVehicleId){const idx=data.vehicles.findIndex(v=>v.id===editingVehicleId);if(idx>=0)data.vehicles[idx]={...data.vehicles[idx],...obj};}
  else{obj.id=genId('veh_');data.vehicles.push(obj);}
  saveData();closeModal('vehicleModal');renderVehicles();toast('✅ Véhicule enregistré');
}
function deleteVehicle(id){if(!confirm('Supprimer ?'))return;data.vehicles=data.vehicles.filter(v=>v.id!==id);saveData();renderVehicles();toast('🗑️ Supprimé');}
</script></body></html>
