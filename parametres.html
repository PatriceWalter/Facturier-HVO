<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HVO - Paramètres</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head><body>
<div id="app"><div id="navContainer"></div>
<div class="app-content">
  <div class="card">
    <div class="card-title">⚙️ Paramètres de l'entreprise</div>
    <div class="form-row"><div class="form-group"><label>Raison sociale</label><input id="setCompany"></div><div class="form-group"><label>SIRET</label><input id="setSiret"></div></div>
    <div class="form-row"><div class="form-group"><label>Adresse</label><input id="setAddress"></div><div class="form-group"><label>Code postal</label><input id="setZip" oninput="autoCity('setZip','setCity')"></div><div class="form-group"><label>Ville</label><input id="setCity"></div></div>
    <div class="form-row"><div class="form-group"><label>Téléphone</label><input id="setPhone"></div><div class="form-group"><label>Email</label><input id="setEmail"></div></div>
    <div class="form-row"><div class="form-group"><label>N° TVA</label><input id="setTva"></div><div class="form-group"><label>RCS</label><input id="setRcs"></div></div>
    <div class="form-row"><div class="form-group"><label>Régime</label><select id="setRegime"><option value="auto">Auto-entrepreneur (art. 293 B)</option><option value="reel">Régime réel</option></select></div><div class="form-group"><label>Taux URSSAF (%)</label><input id="setTauxUrssaf" type="number" step="0.1" value="23.1"></div></div>
    <div class="form-row"><div class="form-group"><label>Préfixe facture</label><input id="setPrefix" value="HVO-"></div><div class="form-group"><label>Prochain N°</label><input id="setNextNum" type="number" min="1" value="1"></div></div>
    <div class="form-group"><label>URL Proxy plaque</label><input id="setProxyUrl" placeholder="https://script.google.com/macros/s/.../exec"></div>
    <div class="form-group"><label>Mentions légales</label><textarea id="setMentions" rows="4"></textarea></div>
    <div class="form-group"><label>Logo</label><div style="display:flex;gap:12px;align-items:center"><img id="logoPreview" src="" style="width:80px;height:80px;object-fit:contain;border:1px solid var(--border);border-radius:8px"><input type="file" id="logoUpload" accept="image/*" onchange="uploadLogo(event)"></div></div>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="saveSettings()">💾 Enregistrer</button>
      <button class="btn btn-success" onclick="exportData()">📤 Exporter JSON</button>
      <button class="btn btn-warning" onclick="document.getElementById('importFile').click()">📥 Importer JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn btn-danger" onclick="reloadCat()">🔄 Recharger catalogue</button>
    </div>
  </div>
</div></div>
<div class="toast" id="toast"></div>
<script src="js/data.js"></script><script src="js/shared.js"></script>
<script>
if(!isLoggedIn()){window.location.href='index.html';}
initData(function(){buildNav('parametres');loadSet();});

function loadSet(){const s=data.settings;
  document.getElementById('setCompany').value=s.companyName||'';document.getElementById('setSiret').value=s.siret||'';
  document.getElementById('setAddress').value=s.address||'';document.getElementById('setZip').value=s.zip||'';document.getElementById('setCity').value=s.city||'';
  document.getElementById('setPhone').value=s.phone||'';document.getElementById('setEmail').value=s.email||'';
  document.getElementById('setTva').value=s.tva||'';document.getElementById('setRcs').value=s.rcs||'';
  document.getElementById('setRegime').value=s.regime||'auto';document.getElementById('setTauxUrssaf').value=s.tauxURSSAF||23.1;
  document.getElementById('setPrefix').value=s.prefix||'HVO-';document.getElementById('setNextNum').value=s.nextNum||1;
  document.getElementById('setProxyUrl').value=s.proxyUrl||'';document.getElementById('setMentions').value=s.mentions||'';
  if(s.logo) document.getElementById('logoPreview').src=s.logo;
}
function saveSettings(){
  const s=data.settings;s.companyName=document.getElementById('setCompany').value.trim();s.siret=document.getElementById('setSiret').value.trim();
  s.address=document.getElementById('setAddress').value.trim();s.zip=document.getElementById('setZip').value.trim();s.city=document.getElementById('setCity').value.trim();
  s.phone=document.getElementById('setPhone').value.trim();s.email=document.getElementById('setEmail').value.trim();
  s.tva=document.getElementById('setTva').value.trim();s.rcs=document.getElementById('setRcs').value.trim();
  s.regime=document.getElementById('setRegime').value;s.tauxURSSAF=parseFloat(document.getElementById('setTauxUrssaf').value)||23.1;
  s.prefix=document.getElementById('setPrefix').value.trim();s.nextNum=parseInt(document.getElementById('setNextNum').value)||1;
  s.proxyUrl=document.getElementById('setProxyUrl').value.trim();s.mentions=document.getElementById('setMentions').value.trim();
  saveData();toast('✅ Paramètres enregistrés');
}
function uploadLogo(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){data.settings.logo=ev.target.result;document.getElementById('logoPreview').src=ev.target.result;saveData();toast('✅ Logo enregistré');};r.readAsDataURL(f);}
function exportData(){const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hvo_backup_'+new Date().toISOString().split('T')[0]+'.json';a.click();toast('📤 Export terminé');}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const imp=JSON.parse(ev.target.result);data={...data,...imp};data.settings={...data.settings,...(imp.settings||{})};if(!data.occasions)data.occasions=[];saveData();loadSet();toast('📥 Import réussi');}catch(err){toast('❌ Fichier invalide');}};r.readAsText(f);e.target.value='';}
function reloadCat(){if(!confirm('Recharger le catalogue par défaut ?'))return;DEFAULT_OPERATIONS.forEach(d=>{const idx=data.operations.findIndex(o=>o.id===d.id);if(idx>=0)data.operations[idx]={...d,parts:d.parts?d.parts.map(p=>({...p})):[]};else data.operations.push({...d,parts:d.parts?d.parts.map(p=>({...p})):[]});});saveData();toast('✅ Catalogue rechargé ('+DEFAULT_OPERATIONS.length+' opérations)');}
</script></body></html>
