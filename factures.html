<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HVO - Factures</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head><body>
<div id="app"><div id="navContainer"></div>
<div class="app-content">
  <div class="stats-row" id="invStats"></div>
  <div class="card">
    <div class="card-title">📄 Factures <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openInvoiceModal()">+ Nouvelle facture</button></div>
    <div class="search-box"><input id="invoiceSearch" placeholder="Rechercher..." oninput="renderInvoices()"></div>
    <div class="table-wrap"><table><thead><tr><th>N°</th><th>Date</th><th>Client</th><th>Véhicule</th><th>Total TTC</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="invoicesTable"></tbody></table></div>
  </div>
</div></div>

<!-- INVOICE MODAL -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal" style="max-width:900px">
    <div class="modal-header"><h3 id="invoiceModalTitle">Nouvelle facture</h3><button class="modal-close" onclick="closeModal('invoiceModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-row-3">
        <div class="form-group"><label>N° Facture</label><input id="invNum" readonly style="background:#f0f0f0;font-weight:700"></div>
        <div class="form-group"><label>Date</label><input id="invDate" type="date"></div>
        <div class="form-group"><label>Statut</label><select id="invStatus"><option value="brouillon">Brouillon</option><option value="envoyee">Envoyée</option><option value="payee">Payée</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Client</label><select id="invClient" onchange="onInvClientChange()"><option value="">--</option></select></div>
        <div class="form-group"><label>Véhicule</label><select id="invVehicle"><option value="">--</option></select></div>
      </div>
      <div class="card-title" style="margin-top:12px">Prestations & pièces <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openOpPicker()">📂 Catalogue</button> <button class="btn btn-secondary btn-sm" onclick="addManualLine()">+ Ligne</button></div>
      <div class="inv-line inv-line-head"><span>Désignation</span><span>Prix HT</span><span>Qté</span><span>TVA%</span><span>Total HT</span><span></span></div>
      <div id="invLines"></div>
      <div style="text-align:right;margin-top:12px;padding:12px;background:var(--silver-light);border-radius:8px">
        <div style="font-size:.9em">Total HT: <strong id="invTotalHT">0.00 €</strong></div>
        <div style="font-size:.9em">TVA: <strong id="invTotalTVA">0.00 €</strong></div>
        <div style="font-size:1.2em;color:var(--primary);font-weight:700">Total TTC: <strong id="invTotalTTC">0.00 €</strong></div>
      </div>
      <div class="form-group" style="margin-top:12px"><label>Observations</label><textarea id="invObs" rows="2"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('invoiceModal')">Annuler</button><button class="btn btn-success" onclick="printInvoice()">🖨️ Imprimer</button><button class="btn btn-primary" onclick="saveInvoice()">💾 Enregistrer</button></div>
  </div>
</div>

<!-- OP PICKER -->
<div class="modal-overlay" id="opPickerModal">
  <div class="modal" style="max-width:800px">
    <div class="modal-header"><h3>📂 Catalogue</h3><button class="modal-close" onclick="closeModal('opPickerModal')">&times;</button></div>
    <div class="modal-body">
      <div class="filter-bar" id="pickerFilterBar">
        <button class="filter-btn active" onclick="filterPicker('all')">Toutes</button>
        <button class="filter-btn" onclick="filterPicker('T1')">T1</button><button class="filter-btn" onclick="filterPicker('T2')">T2</button>
        <button class="filter-btn" onclick="filterPicker('T3')">T3</button><button class="filter-btn" onclick="filterPicker('T4')">T4</button>
        <button class="filter-btn" onclick="filterPicker('T5')">T5</button><button class="filter-btn" onclick="filterPicker('T6')">T6</button>
        <button class="filter-btn" onclick="filterPicker('T7')">T7</button><button class="filter-btn" onclick="filterPicker('T8')">T8</button>
      </div>
      <input type="text" id="opPickerSearch" placeholder="Rechercher..." style="width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;margin-bottom:12px" oninput="renderOpPicker()">
      <div class="op-grid" id="opPickerGrid"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('opPickerModal')">Annuler</button><button class="btn btn-primary" onclick="addSelectedOps()">✅ Ajouter</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/data.js"></script><script src="js/shared.js"></script>
<script>
if(!isLoggedIn()){window.location.href='index.html';}
let editingInvoiceId=null,invoiceLines=[],selectedOps=new Set(),pickerFilter='all';
initData(function(){buildNav('factures');renderInvoices();});

function renderInvoices(){
  const s=(document.getElementById('invoiceSearch')?.value||'').toLowerCase();
  const paidTTC=data.invoices.filter(i=>i.status==='payee').reduce((s,i)=>s+(i.totalTTC||0),0);
  const pending=data.invoices.filter(i=>i.status!=='payee').reduce((s,i)=>s+(i.totalTTC||0),0);
  document.getElementById('invStats').innerHTML=
    '<div class="stat-card"><div class="stat-value">'+data.invoices.length+'</div><div class="stat-label">Total</div></div>'
    +'<div class="stat-card green"><div class="stat-value">'+paidTTC.toFixed(2)+' €</div><div class="stat-label">Payées</div></div>'
    +'<div class="stat-card orange"><div class="stat-value">'+pending.toFixed(2)+' €</div><div class="stat-label">En attente</div></div>';
  document.getElementById('invoicesTable').innerHTML=data.invoices.filter(i=>{
    const cl=data.clients.find(c=>c.id===i.clientId);return !s||((i.number||'')+' '+(cl?cl.nom:'')+' '+(i.date||'')).toLowerCase().includes(s);
  }).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(inv=>{
    const cl=data.clients.find(c=>c.id===inv.clientId);const vh=data.vehicles.find(v=>v.id===inv.vehicleId);
    return '<tr><td><strong>'+(inv.number||'')+'</strong></td><td>'+(inv.date||'')+'</td><td>'+(cl?cl.nom+' '+(cl.prenom||''):'')+'</td><td>'+(vh?vh.plaque:'')+'</td><td><strong>'+(inv.totalTTC||0).toFixed(2)+' €</strong></td><td><span class="badge badge-'+(inv.status||'brouillon')+'">'+(inv.status||'brouillon')+'</span></td>'
      +'<td><button class="btn btn-primary btn-sm" onclick="editInvoice(\''+inv.id+'\')">✏️</button> <button class="btn btn-success btn-sm" onclick="printInvById(\''+inv.id+'\')">🖨️</button> <button class="btn btn-secondary btn-sm" onclick="dupInvoice(\''+inv.id+'\')">📋</button> <button class="btn btn-danger btn-sm" onclick="delInvoice(\''+inv.id+'\')">🗑️</button></td></tr>';
  }).join('');
}
function openInvoiceModal(id){
  editingInvoiceId=id||null;document.getElementById('invoiceModalTitle').textContent=id?'Modifier':'Nouvelle facture';
  document.getElementById('invClient').innerHTML='<option value="">--</option>'+data.clients.map(c=>'<option value="'+c.id+'">'+c.nom+' '+(c.prenom||'')+'</option>').join('');
  document.getElementById('invVehicle').innerHTML='<option value="">--</option>'+data.vehicles.map(v=>'<option value="'+v.id+'">'+v.plaque+' — '+v.marque+' '+v.modele+'</option>').join('');
  if(id){const inv=data.invoices.find(x=>x.id===id);if(inv){document.getElementById('invNum').value=inv.number||'';document.getElementById('invDate').value=inv.date||'';document.getElementById('invStatus').value=inv.status||'brouillon';document.getElementById('invClient').value=inv.clientId||'';document.getElementById('invVehicle').value=inv.vehicleId||'';document.getElementById('invObs').value=inv.observations||'';invoiceLines=(inv.lines||[]).map(l=>({...l}));}}
  else{document.getElementById('invNum').value=data.settings.prefix+String(data.settings.nextNum).padStart(4,'0');document.getElementById('invDate').value=new Date().toISOString().split('T')[0];document.getElementById('invStatus').value='brouillon';document.getElementById('invClient').value='';document.getElementById('invVehicle').value='';document.getElementById('invObs').value='';invoiceLines=[];}
  renderInvLines();openModal('invoiceModal');
}
function editInvoice(id){openInvoiceModal(id);}
function onInvClientChange(){const c=document.getElementById('invClient').value;if(c){const v=data.vehicles.find(x=>x.clientId===c);if(v)document.getElementById('invVehicle').value=v.id;}}
function renderInvLines(){
  document.getElementById('invLines').innerHTML=invoiceLines.map((l,i)=>
    '<div class="inv-line '+(l.lineType||'mo')+'">'
    +'<input value="'+(l.desc||'')+'" onchange="invoiceLines['+i+'].desc=this.value;calcTotals()">'
    +'<input type="number" step="0.01" value="'+(l.prixHT||0)+'" onchange="invoiceLines['+i+'].prixHT=parseFloat(this.value)||0;calcTotals()">'
    +'<input type="number" step="1" value="'+(l.qty||1)+'" onchange="invoiceLines['+i+'].qty=parseInt(this.value)||1;calcTotals()">'
    +'<input type="number" step="0.1" value="'+(l.tva||20)+'" onchange="invoiceLines['+i+'].tva=parseFloat(this.value)||20;calcTotals()">'
    +'<span style="font-weight:700">'+((l.prixHT||0)*(l.qty||1)).toFixed(2)+' €</span>'
    +'<button class="line-del" onclick="invoiceLines.splice('+i+',1);renderInvLines()">✕</button></div>'
  ).join('');calcTotals();
}
function calcTotals(){let ht=0,tv=0;invoiceLines.forEach(l=>{const h=(l.prixHT||0)*(l.qty||1);ht+=h;tv+=h*(l.tva||20)/100;});document.getElementById('invTotalHT').textContent=ht.toFixed(2)+' €';document.getElementById('invTotalTVA').textContent=tv.toFixed(2)+' €';document.getElementById('invTotalTTC').textContent=(ht+tv).toFixed(2)+' €';}
function addManualLine(){invoiceLines.push({desc:'',prixHT:0,qty:1,tva:20,lineType:'mo'});renderInvLines();}
function openOpPicker(){selectedOps.clear();pickerFilter='all';document.getElementById('opPickerSearch').value='';renderOpPicker();openModal('opPickerModal');}
function filterPicker(t){pickerFilter=t;document.querySelectorAll('#pickerFilterBar .filter-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(t==='all'?'Toutes':t)));renderOpPicker();}
function renderOpPicker(){
  const s=(document.getElementById('opPickerSearch')?.value||'').toLowerCase();
  document.getElementById('opPickerGrid').innerHTML=data.operations.filter(o=>(pickerFilter==='all'||o.type===pickerFilter)&&(!s||o.name.toLowerCase().includes(s))).map(o=>
    '<div class="op-item '+(selectedOps.has(o.id)?'selected':'')+'" onclick="toggleOp(\''+o.id+'\')">'
    +'<div class="op-check">'+(selectedOps.has(o.id)?'✓':'')+'</div>'
    +'<div><span class="badge badge-'+o.type.toLowerCase()+'" style="margin-right:4px">'+o.type+'</span>'+o.name+'<br><small style="color:var(--text-light)">'+(o.price||0).toFixed(2)+' € MO'+(o.parts&&o.parts.length?' + '+o.parts.length+' pièce(s)':'')+'</small></div></div>'
  ).join('');
}
function toggleOp(id){if(selectedOps.has(id))selectedOps.delete(id);else selectedOps.add(id);renderOpPicker();}
function addSelectedOps(){
  selectedOps.forEach(opId=>{const op=data.operations.find(o=>o.id===opId)||DEFAULT_OPERATIONS.find(o=>o.id===opId);if(!op)return;
    invoiceLines.push({desc:op.name,prixHT:op.price||0,qty:1,tva:op.tva||20,lineType:'mo'});
    if(op.parts&&op.parts.length)op.parts.forEach(p=>invoiceLines.push({desc:p.desc,prixHT:p.price||0,qty:1,tva:op.tva||20,lineType:'piece'}));
  });closeModal('opPickerModal');renderInvLines();toast('✅ '+selectedOps.size+' op ajoutée(s)');
}
function saveInvoice(){
  let ht=0,tv=0;invoiceLines.forEach(l=>{const h=(l.prixHT||0)*(l.qty||1);ht+=h;tv+=h*(l.tva||20)/100;});
  const obj={number:document.getElementById('invNum').value,date:document.getElementById('invDate').value,status:document.getElementById('invStatus').value,clientId:document.getElementById('invClient').value,vehicleId:document.getElementById('invVehicle').value,observations:document.getElementById('invObs').value.trim(),lines:invoiceLines.map(l=>({...l})),totalHT:ht,totalTVA:tv,totalTTC:ht+tv};
  if(editingInvoiceId){const idx=data.invoices.findIndex(i=>i.id===editingInvoiceId);if(idx>=0)data.invoices[idx]={...data.invoices[idx],...obj};}
  else{obj.id=genId('inv_');data.settings.nextNum=(data.settings.nextNum||1)+1;data.invoices.push(obj);}
  saveData();closeModal('invoiceModal');renderInvoices();toast('✅ Facture enregistrée');
}
function delInvoice(id){if(!confirm('Supprimer ?'))return;data.invoices=data.invoices.filter(i=>i.id!==id);saveData();renderInvoices();toast('🗑️ Supprimée');}
function dupInvoice(id){const o=data.invoices.find(i=>i.id===id);if(!o)return;const d={...o,id:genId('inv_'),number:data.settings.prefix+String(data.settings.nextNum).padStart(4,'0'),date:new Date().toISOString().split('T')[0],status:'brouillon',lines:o.lines.map(l=>({...l}))};data.settings.nextNum++;data.invoices.push(d);saveData();renderInvoices();toast('📋 Dupliquée');}
function printInvById(id){const inv=data.invoices.find(i=>i.id===id);if(!inv)return;doPrint(inv);}
function printInvoice(){let ht=0,tv=0;invoiceLines.forEach(l=>{const h=(l.prixHT||0)*(l.qty||1);ht+=h;tv+=h*(l.tva||20)/100;});doPrint({number:document.getElementById('invNum').value,date:document.getElementById('invDate').value,clientId:document.getElementById('invClient').value,vehicleId:document.getElementById('invVehicle').value,lines:invoiceLines,totalHT:ht,totalTVA:tv,totalTTC:ht+tv,observations:document.getElementById('invObs').value});}
function doPrint(inv){
  const cl=data.clients.find(c=>c.id===inv.clientId)||{};const vh=data.vehicles.find(v=>v.id===inv.vehicleId)||{};const s=data.settings;
  let h=getPrintHeader()+'<h2 style="text-align:center;color:#1a3a5c;margin:16px 0">FACTURE N° '+(inv.number||'')+'</h2>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px">';
  h+='<div class="doc-section"><h4>Client</h4><strong>'+(cl.nom||'')+' '+(cl.prenom||'')+'</strong><br>'+(cl.adresse||'')+'<br>'+(cl.cp||'')+' '+(cl.ville||'')+'</div>';
  h+='<div class="doc-section"><h4>Véhicule</h4>'+(vh.marque||'')+' '+(vh.modele||'')+'<br>Plaque: <strong>'+(vh.plaque||'')+'</strong></div></div>';
  h+='<div style="text-align:right;margin-bottom:8px;font-size:.9em">Date: <strong>'+(inv.date||'')+'</strong></div>';
  h+='<table><thead><tr><th>Désignation</th><th>Prix HT</th><th>Qté</th><th>TVA</th><th>Total HT</th></tr></thead><tbody>';
  (inv.lines||[]).forEach(l=>{const ht=(l.prixHT||0)*(l.qty||1);const bg=l.lineType==='piece'?'background:#fffde7;border-left:3px solid #f39c12':'background:#e3f2fd;border-left:3px solid #3498db';h+='<tr style="'+bg+'"><td>'+l.desc+'</td><td>'+(l.prixHT||0).toFixed(2)+'</td><td>'+(l.qty||1)+'</td><td>'+(l.tva||20)+'%</td><td style="font-weight:700">'+ht.toFixed(2)+' €</td></tr>';});
  h+='</tbody></table>';
  h+='<div style="text-align:right;margin:16px 0;padding:14px;background:#f0f2f4;border-radius:8px"><div>Total HT: <strong>'+(inv.totalHT||0).toFixed(2)+' €</strong></div><div>TVA: <strong>'+(inv.totalTVA||0).toFixed(2)+' €</strong></div><div style="font-size:1.3em;color:#1a3a5c;margin-top:8px">Total TTC: <strong>'+(inv.totalTTC||0).toFixed(2)+' €</strong></div></div>';
  if(s.regime==='auto')h+='<p style="font-style:italic;font-size:.82em;color:#666">TVA non applicable, art. 293 B du CGI</p>';
  if(inv.observations)h+='<p style="font-size:.85em"><strong>Observations:</strong> '+inv.observations+'</p>';
  h+='<div style="font-size:.78em;color:#888;margin-top:16px;padding-top:12px;border-top:1px solid #ddd;white-space:pre-line">'+(s.mentions||'')+'</div>';
  openPrintWindow('Facture '+inv.number,h);
}
</script></body></html>
