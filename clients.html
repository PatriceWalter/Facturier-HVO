<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HVO - Clients</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head><body>
<div id="app">
<div id="navContainer"></div>
<div class="app-content">
  <div class="card">
    <div class="card-title">👥 Gestion des Clients <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openClientModal()">+ Nouveau client</button></div>
    <div class="search-box"><input id="clientSearch" placeholder="Rechercher un client..." oninput="renderClients()"></div>
    <div class="table-wrap"><table><thead><tr><th>Nom</th><th>Prénom</th><th>Tél</th><th>Email</th><th>Ville</th><th>Actions</th></tr></thead><tbody id="clientsTable"></tbody></table></div>
  </div>
</div></div>

<!-- CLIENT MODAL -->
<div class="modal-overlay" id="clientModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header"><h3 id="clientModalTitle">Nouveau client</h3><button class="modal-close" onclick="closeModal('clientModal')">&times;</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label>Nom *</label><input id="cNom"></div><div class="form-group"><label>Prénom</label><input id="cPrenom"></div></div>
      <div class="form-row"><div class="form-group"><label>Téléphone</label><input id="cTel"></div><div class="form-group"><label>Email</label><input id="cEmail"></div></div>
      <div class="form-group"><label>Adresse</label><input id="cAdresse"></div>
      <div class="form-row"><div class="form-group"><label>Code postal</label><input id="cCp" oninput="autoCity('cCp','cVille')"></div><div class="form-group"><label>Ville</label><input id="cVille"></div></div>
      <div class="form-group"><label>Notes</label><textarea id="cNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('clientModal')">Annuler</button><button class="btn btn-primary" onclick="saveClient()">💾 Enregistrer</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="js/data.js"></script><script src="js/shared.js"></script>
<script>
if(!isLoggedIn()){window.location.href='index.html';}
let editingClientId=null;
initData(function(){buildNav('clients');renderClients();});

function renderClients(){
  const search=(document.getElementById('clientSearch')?.value||'').toLowerCase();
  const filtered=data.clients.filter(c=>{return !search||(c.nom+' '+c.prenom+' '+c.tel+' '+c.email+' '+c.ville).toLowerCase().includes(search);});
  document.getElementById('clientsTable').innerHTML=filtered.map(c=>
    '<tr><td>'+c.nom+'</td><td>'+(c.prenom||'')+'</td><td>'+(c.tel||'')+'</td><td>'+(c.email||'')+'</td><td>'+(c.ville||'')+'</td>'
    +'<td><button class="btn btn-primary btn-sm" onclick="editClient(\''+c.id+'\')">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteClient(\''+c.id+'\')">🗑️</button></td></tr>'
  ).join('');
}
function openClientModal(id){
  editingClientId=id||null;
  document.getElementById('clientModalTitle').textContent=id?'Modifier client':'Nouveau client';
  if(id){const c=data.clients.find(x=>x.id===id);if(c){document.getElementById('cNom').value=c.nom||'';document.getElementById('cPrenom').value=c.prenom||'';document.getElementById('cTel').value=c.tel||'';document.getElementById('cEmail').value=c.email||'';document.getElementById('cAdresse').value=c.adresse||'';document.getElementById('cCp').value=c.cp||'';document.getElementById('cVille').value=c.ville||'';document.getElementById('cNotes').value=c.notes||'';}}
  else{['cNom','cPrenom','cTel','cEmail','cAdresse','cCp','cVille','cNotes'].forEach(i=>document.getElementById(i).value='');}
  openModal('clientModal');
}
function editClient(id){openClientModal(id);}
function saveClient(){
  const nom=document.getElementById('cNom').value.trim();if(!nom){toast('❌ Le nom est obligatoire');return;}
  const obj={nom,prenom:document.getElementById('cPrenom').value.trim(),tel:document.getElementById('cTel').value.trim(),email:document.getElementById('cEmail').value.trim(),adresse:document.getElementById('cAdresse').value.trim(),cp:document.getElementById('cCp').value.trim(),ville:document.getElementById('cVille').value.trim(),notes:document.getElementById('cNotes').value.trim()};
  if(editingClientId){const idx=data.clients.findIndex(c=>c.id===editingClientId);if(idx>=0)data.clients[idx]={...data.clients[idx],...obj};}
  else{obj.id=genId('clt_');data.clients.push(obj);}
  saveData();closeModal('clientModal');renderClients();toast('✅ Client enregistré');
}
function deleteClient(id){if(!confirm('Supprimer ce client ?'))return;data.clients=data.clients.filter(c=>c.id!==id);saveData();renderClients();toast('🗑️ Client supprimé');}
</script></body></html>
