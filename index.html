/* ═══ TABLEAU DE BORD ═══ */

/* ═══ ÉDITEUR ═══ */

  const[f,sf]=useState(JSON.parse(JSON.stringify(init))),[tab,sTab]=useState("gen"),[dirty,sD]=useState(false),[pL,sPL]=useState(false),[pM,sPM]=useState(""),[pC,sPC]=useState(""),[vs,sVs]=useState(""),[vO,sVO]=useState(false),[cO,sCO]=useState(false);

  const uL=(lk,id,fi,v)=>{sf(prev=>{const n=JSON.parse(JSON.stringify(prev)),it=n[lk].find(i=>i.id===id);if(it)it[fi]=v;return n});sD(true)};

      <select style={{padding:"6px 10px",background:"var(--c)",border:"1px solid var(--b)",borderRadius:6,fontSize:13}} value={f.status} onChange={e=>u("status",e.target.value)}>{Object.entries(SM).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select>
      <button className={dirty?"B Bv":"B Bs"} onClick={()=>{onS(f);sD(false)}}>{dirty?"💾 Sauvegarder":"✓ OK"}</button>

    <div className="F">
      {tab==="gen"&&<div className="G"><Fd l="N° facture" v={f.num} c={v=>u("num",v)}/><Fd l="Date" t="date" v={f.date} c={v=>u("date",v)}/><Fd l="N° O.R." v={f.or} c={v=>u("or",v)}/><Fd l="TVA (%)" t="number" v={f.tvaRate} c={v=>u("tvaRate",parseFloat(v)||0)}/><Fd l="Taux T1 (€/h)" t="number" v={f.tauxT1} c={v=>u("tauxT1",parseFloat(v)||0)}/><Fd l="Taux T2 (€/h)" t="number" v={f.tauxT2} c={v=>u("tauxT2",parseFloat(v)||0)}/><Fd l="Taux T3 (€/h)" t="number" v={f.tauxT3} c={v=>u("tauxT3",parseFloat(v)||0)}/><div/><div style={{gridColumn:"1/-1"}}><Fd l="Notes / observations" v={f.notes} c={v=>u("notes",v)} ml/></div></div>}

/* ─── Section main-d'œuvre avec templates ─── */

/* ═══ APERÇU / IMPRESSION ═══ */
function Prev({inv:f,shop,onB,onD}){
  const aM=[...(f.laborT1||[]),...(f.laborT2||[]),...(f.laborT3||[])],mT=aM.reduce((s,l)=>s+(parseFloat(l.temps)||0)*(parseFloat(l.taux)||0),0),pT=(f.parts||[]).reduce((s,p)=>s+(parseFloat(p.qty)||0)*(parseFloat(p.pu)||0),0),eT=(f.ecoFees||[]).reduce((s,e)=>s+(parseFloat(e.pu)||0),0),ht=mT+pT+eT,tva=ht*(f.tvaRate/100),ttc=ht+tva,tH=aM.reduce((s,l)=>s+(parseFloat(l.temps)||0),0);
  const pr=()=>{const el=document.getElementById("pz");if(!el)return;const w=window.open("","_blank");w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+f.num+'</title><style>@page{size:A4;margin:14mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;font-size:10px;color:#2D2318;line-height:1.4}table{width:100%;border-collapse:collapse}th,td{padding:4px 7px;text-align:left;font-size:10px}th{background:#4A3728;color:#F0EBE2;font-weight:600;border:1px solid #4A3728}td{border:1px solid #DDD6CB}.sc{font-size:11px;font-weight:700;color:#4A3728;border-bottom:2px solid #C49A2A;padding-bottom:3px;margin:14px 0 7px;text-transform:uppercase;letter-spacing:.5px}.su td{background:#EDE8E0;font-weight:600;color:#4A3728}.to td{background:#4A3728;color:#F0EBE2;font-weight:700;border-color:#4A3728}.gl{color:#E8C547}.al{background:#FAFAF8}.r{text-align:right}.c{text-align:center}.bo{font-weight:700}.rc{margin-left:auto;width:250px;margin-top:8px}.rc td{border:none;padding:4px 7px}.tt td{background:#4A3728;color:#E8C547;font-size:12px;font-weight:700;border:none}.logo-print{max-height:50px;max-width:180px;object-fit:contain}.legal{margin-top:12px;padding:8px;font-size:8px;color:#8D7E6F;border-top:1px solid #DDD6CB;line-height:1.5}</style></head><body>'+el.innerHTML+'</body></html>');w.document.close();setTimeout(()=>w.print(),400)};
  const mb=(titre,items)=>{if(!items||!items.length)return null;return<>{[<tr key={"s"+titre} className="su"><td colSpan={4}>{titre}</td></tr>,...items.map((l,i)=>{const t=(parseFloat(l.temps)||0)*(parseFloat(l.taux)||0);return<tr key={l.id||i} className={i%2?"al":""}><td>{l.op}</td><td className="c">{fH(l.temps)}</td><td className="r">{fE(l.taux)}</td><td className="r">{fE(t)}</td></tr>})]}</>};
  const vc={fontWeight:600,background:"#EDE8E0",width:"15%"},vv={width:"35%"};
  return<div>
    <div style={{display:"flex",gap:7,marginBottom:14}} className="np"><button className="B Bw" onClick={onB}>← Éditer</button><button className="B Bw" onClick={onD}>Accueil</button><div style={{flex:1}}/><button className="B Bg" onClick={pr}>🖨 Imprimer / PDF</button></div>
    <div id="pz" className="Z">
      <div style={{display:"flex",justifyContent:"space-between",paddingBottom:10,marginBottom:14,borderBottom:"3px solid #C49A2A"}}>
        <div>{shop.logo&&<img src={shop.logo} className="logo-print" style={{marginBottom:4,display:"block"}}/>}<div style={{fontSize:14,fontWeight:700,color:"#4A3728",letterSpacing:1}}>{shop.name}</div><div style={{fontSize:9,color:"#C49A2A",fontStyle:"italic"}}>{shop.sub}</div><div style={{fontSize:9,color:"#6B5344",marginTop:4,lineHeight:1.5}}>{shop.addr}<br/>{shop.city}<br/>{shop.tel} — {shop.email}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontWeight:700,fontSize:10,color:"#4A3728",marginBottom:2}}>CLIENT</div><div style={{fontWeight:700,fontSize:11}}>{f.client.name}</div><div style={{fontSize:9,color:"#6B5344",lineHeight:1.5}}>{f.client.addr}<br/>{f.client.city}<br/>{f.client.tel}{f.client.email?" — "+f.client.email:""}</div></div></div>
      <div style={{textAlign:"center",marginBottom:14,padding:"8px 0",border:"2px solid #C49A2A",background:"linear-gradient(to right,#FAFAF8,#F0EBE2,#FAFAF8)"}}><h1 style={{fontSize:17,color:"#4A3728",letterSpacing:3,marginBottom:1,fontFamily:"Georgia,serif"}}>FACTURE D'INTERVENTION</h1><p style={{color:"#C49A2A",fontSize:10}}>N° {f.num} | {new Date(f.date).toLocaleDateString("fr-FR")} | O.R. {f.or}</p></div>
      <div className="sc">Véhicule</div>
      <table><tbody>{[[["Marque",f.vehicle.marque],["Modèle",f.vehicle.modele]],[["Année",f.vehicle.annee],["Finition",f.vehicle.finition]],[["VIN",f.vehicle.vin],["Immatriculation",f.vehicle.immat]],[["Code moteur",f.vehicle.moteur],["Boîte",f.vehicle.boite]],[["Kilométrage",f.vehicle.km],["Énergie",f.vehicle.energie]],[["Couleur",f.vehicle.couleur],["",""]]].map((r,i)=><tr key={i}><td style={vc}>{r[0][0]}</td><td style={vv}>{r[0][1]}</td><td style={vc}>{r[1][0]}</td><td style={vv}>{r[1][1]}</td></tr>)}</tbody></table>
      {aM.length>0&&<><div className="sc">Main-d'œuvre</div><table><thead><tr><th>Opération</th><th style={{width:50}} className="c">Temps</th><th style={{width:60}} className="r">Taux</th><th style={{width:60}} className="r">Total HT</th></tr></thead><tbody>{mb("T1 — Entretien",f.laborT1)}{mb("T2 — Mécanique lourde",f.laborT2)}{mb("T3 — Diagnostic",f.laborT3)}<tr className="to"><td colSpan={3} className="r">Sous-total MO ({fH(tH)})</td><td className="r gl">{fE(mT)}</td></tr></tbody></table></>}
      {f.parts.length>0&&<><div className="sc">Pièces et fluides</div><table><thead><tr><th style={{width:70}}>Réf.</th><th>Désignation</th><th style={{width:28}} className="c">Qté</th><th style={{width:55}} className="r">P.U.</th><th style={{width:55}} className="r">Total</th></tr></thead><tbody>{f.parts.map((p,i)=><tr key={p.id||i} className={i%2?"al":""}><td style={{fontSize:9}}>{p.ref}</td><td>{p.desc}</td><td className="c">{p.qty}</td><td className="r">{fE(p.pu)}</td><td className="r">{fE((parseFloat(p.qty)||0)*(parseFloat(p.pu)||0))}</td></tr>)}<tr className="to"><td colSpan={4} className="r">Sous-total pièces</td><td className="r gl">{fE(pT)}</td></tr></tbody></table></>}
      {f.ecoFees.length>0&&<><div className="sc">Frais environnementaux</div><table><thead><tr><th>Désignation</th><th style={{width:55}} className="r">HT</th></tr></thead><tbody>{f.ecoFees.map((e,i)=><tr key={e.id||i} className={i%2?"al":""}><td>{e.desc}</td><td className="r">{fE(e.pu)}</td></tr>)}<tr className="to"><td className="r">Sous-total frais</td><td className="r gl">{fE(eT)}</td></tr></tbody></table></>}
      <div className="sc">Récapitulatif</div><table className="rc"><tbody><tr><td className="bo">Total MO HT</td><td className="r">{fE(mT)}</td></tr><tr><td className="bo">Total pièces HT</td><td className="r">{fE(pT)}</td></tr>{eT>0&&<tr><td className="bo">Total frais HT</td><td className="r">{fE(eT)}</td></tr>}<tr style={{borderTop:"2px solid #C49A2A"}}><td className="bo">BASE HT</td><td className="r bo">{fE(ht)}</td></tr><tr><td>TVA {f.tvaRate} %</td><td className="r">{fE(tva)}</td></tr><tr className="tt"><td>NET À PAYER TTC</td><td className="r">{fE(ttc)}</td></tr></tbody></table>
      {f.checks.length>0&&<><div className="sc">Contrôles</div><table><thead><tr><th>Point</th><th>Résultat</th></tr></thead><tbody>{f.checks.map((c,i)=><tr key={c.id||i} className={i%2?"al":""}><td className="bo">{c.pt}</td><td>{c.res}</td></tr>)}</tbody></table></>}
      {f.notes&&<div style={{marginTop:10,padding:8,background:"#FAFAF8",borderRadius:4,fontSize:10,border:"1px solid #DDD6CB"}}><b>Notes :</b> {f.notes}</div>}
      {shop.legal&&<div className="legal">{shop.legal}</div>}
      <div style={{marginTop:14,paddingTop:6,borderTop:"1px solid #DDD6CB",fontSize:8,color:"#8D7E6F",textAlign:"center"}}>{shop.name} — {shop.addr} — {shop.city} | SIRET : {shop.siret} | TVA : {shop.tvaIntra} | APE : {shop.ape}</div>
      <div style={{marginTop:18}}><b style={{color:"#4A3728",fontSize:10}}>Bon pour accord — Signature du client :</b><div style={{height:40,borderBottom:"1px solid #DDD6CB",marginTop:24}}><span style={{fontSize:9,color:"#8D7E6F"}}>Date :{"                              "}Signature :</span></div></div>
    </div></div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
