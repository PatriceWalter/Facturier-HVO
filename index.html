<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVO - Facturier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img id="loginLogo" src="" alt="HVO">
    <h2>FACTURIER</h2>
    <p>Réparation Véhicule Multi Marque</p>
    <input type="password" id="loginCode" placeholder="Code d'accès" maxlength="6" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ACCÉDER</button>
    <div class="login-error" id="loginError">Code incorrect</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div id="navContainer"></div>
<div class="app-content">
  <div class="stats-row" id="dashStats"></div>
  <div class="card">
    <div class="card-title">📊 Dernières factures</div>
    <div class="table-wrap"><table><thead><tr><th>N°</th><th>Date</th><th>Client</th><th>Véhicule</th><th>Total TTC</th><th>Statut</th></tr></thead><tbody id="dashInvoices"></tbody></table></div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script>
// Pre-load logo for login screen from localStorage
(function(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){const d=JSON.parse(s);if(d.settings&&d.settings.logo){document.getElementById('loginLogo').src=d.settings.logo;}}
  }catch(e){}
  // If already logged in, skip login screen
  if(isLoggedIn()){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    onPageReady();
  }
})();

function onPageReady(){
  initData(function(){
    buildNav('index');
    renderDashboard();
    // Update logo
    if(data.settings.logo) document.getElementById('loginLogo').src = data.settings.logo;
  });
}

function renderDashboard(){
  const paid=data.invoices.filter(i=>i.status==='payee');
  const totalCA=paid.reduce((s,i)=>s+(i.totalTTC||0),0);
  const now=new Date();
  const monthCA=paid.filter(i=>{const d=new Date(i.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,i)=>s+(i.totalTTC||0),0);
  document.getElementById('dashStats').innerHTML=
    '<div class="stat-card"><div class="stat-value">'+data.clients.length+'</div><div class="stat-label">Clients</div></div>'
    +'<div class="stat-card"><div class="stat-value">'+data.vehicles.length+'</div><div class="stat-label">Véhicules</div></div>'
    +'<div class="stat-card"><div class="stat-value">'+data.invoices.length+'</div><div class="stat-label">Factures</div></div>'
    +'<div class="stat-card green"><div class="stat-value">'+monthCA.toFixed(2)+' €</div><div class="stat-label">CA du mois</div></div>'
    +'<div class="stat-card red"><div class="stat-value">'+totalCA.toFixed(2)+' €</div><div class="stat-label">CA total</div></div>';
  const recent=[...data.invoices].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  document.getElementById('dashInvoices').innerHTML=recent.map(inv=>{
    const cl=data.clients.find(c=>c.id===inv.clientId);
    const vh=data.vehicles.find(v=>v.id===inv.vehicleId);
    return '<tr><td>'+inv.number+'</td><td>'+(inv.date||'')+'</td><td>'+(cl?cl.nom+' '+(cl.prenom||''):'')+'</td><td>'+(vh?vh.plaque:'')+'</td><td><strong>'+(inv.totalTTC||0).toFixed(2)+' €</strong></td><td><span class="badge badge-'+(inv.status||'brouillon')+'">'+(inv.status||'brouillon')+'</span></td></tr>';
  }).join('');
}
</script>
</body>
</html>
