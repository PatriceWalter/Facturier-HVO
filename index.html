function renderDevis() {
    if (!data.devis) data.devis = [];
    const search = (document.getElementById('devisSearch')?.value || '').toLowerCase();
    let filtered = [...data.devis].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    if (search) {
        filtered = filtered.filter(d => {
            const cl = data.clients.find(c => c.id === d.clientId);
            const vh = data.vehicles.find(v => v.id === d.vehicleId);
            return (d.number + ' ' + (cl ? cl.nom + ' ' + cl.prenom : '') + ' ' + (vh ? vh.plaque + ' ' + vh.marque : '')).toLowerCase().includes(search);
        });
    }
    document.getElementById('devisTable').innerHTML = filtered.map(d => {
        const cl = data.clients.find(c => c.id === d.clientId);
        const vh = data.vehicles.find(v => v.id === d.vehicleId);
        const statusBadge = d.status === 'accepted' ? '<span class="badge badge-paid" style="padding:6px 14px;font-size:0.9em">✅ Accepté</span>' :
            d.status === 'refused' ? '<span class="badge badge-overdue" style="padding:6px 14px;font-size:0.9em">❌ Refusé</span>' :
            d.status === 'invoiced' ? '<span class="badge" style="background:#e0f2fe;color:#0369a1;padding:6px 14px;font-size:0.9em">🧾 Facturé</span>' :
            '<span class="badge badge-pending" style="padding:6px 14px;font-size:0.9em">⏳ En attente</span>';
        return '<tr>' +
            '<td><strong>' + d.number + '</strong></td>' +
            '<td>' + formatDate(d.date) + '</td>' +
            '<td>' + (cl ? cl.nom + ' ' + cl.prenom : '-') + '</td>' +
            '<td>' + (vh ? vh.plaque : '-') + '</td>' +
            '<td><strong>' + (d.totalTTC||0).toFixed(2) + ' €</strong></td>' +
            '<td>' + statusBadge + '</td>' +
            '<td style="white-space:nowrap">' +
                '<button class="btn btn-sm btn-outline" onclick="editDevis(\'' + d.id + '\')" style="font-size:1.3em;padding:6px 12px" title="Modifier">✏️</button>' +
                '<button class="btn btn-sm btn-secondary" onclick="printDevis(\'' + d.id + '\')" style="font-size:1.3em;padding:6px 12px" title="Imprimer">🖨️</button>' +
                (d.status !== 'invoiced' ? '<button class="btn btn-sm btn-success" onclick="convertDevisToInvoice(\'' + d.id + '\')" style="font-size:1.2em;padding:6px 12px" title="Convertir en facture">🧾➡️</button>' : '') +
                '<button class="btn btn-sm btn-danger" onclick="deleteDevis(\'' + d.id + '\')" style="font-size:1.3em;padding:6px 12px" title="Supprimer">🗑️</button>' +
            '</td></tr>';
    }).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text-light)">Aucun devis</td></tr>';
}

function openDevisModal(id) {
    editingDevisId = id || null;
    document.getElementById('devisModalTitle').textContent = id ? 'Modifier devis' : 'Nouveau devis';

    // Populate clients
    document.getElementById('dClient').innerHTML = '<option value="">-- Sélectionner --</option>' +
        data.clients.map(c => '<option value="' + c.id + '">' + c.nom + ' ' + c.prenom + '</option>').join('');

    if (id) {
        const d = data.devis.find(x => x.id === id);
        if (d) {
            document.getElementById('dNum').value = d.number;
            document.getElementById('dDate').value = d.date;
            document.getElementById('dValidite').value = d.validite || '';
            document.getElementById('dClient').value = d.clientId;
            loadDevisVehicles();
            document.getElementById('dVehicle').value = d.vehicleId;
            document.getElementById('dKmIn').value = d.kmIn || '';
            document.getElementById('dStatut').value = d.status;
            setDevisStatus(d.status);
            document.getElementById('dNotes').value = d.notes || '';
            currentDevisLines = d.lines ? d.lines.map(l => ({...l})) : [];
        }
    } else {
        document.getElementById('dNum').value = genNumber(data.settings.devisPrefix, data.settings.nextDevisNum || 1);
        document.getElementById('dDate').value = new Date().toISOString().split('T')[0];
        // Validité 30 jours par défaut

        valid.setDate(valid.getDate() + 30);
        document.getElementById('dValidite').value = valid.toISOString().split('T')[0];
        document.getElementById('dClient').value = '';
        document.getElementById('dVehicle').innerHTML = '<option value="">-- Sélectionner client --</option>';
        document.getElementById('dKmIn').value = '';
        document.getElementById('dStatut').value = 'pending';
        setDevisStatus('pending');
        document.getElementById('dNotes').value = '';
        currentDevisLines = [];
    }
    renderDevisLines();
    openModal('devisModal');
}

function setDevisStatus(status) {
    document.getElementById('dStatut').value = status;
    document.querySelectorAll('#dStatutBtns .status-btn').forEach(b => {
        const s = b.getAttribute('data-status');
        if (s === status) {
            b.style.transform = 'scale(1.08)'; b.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)'; b.style.opacity = '1';
            if (s === 'pending') { b.style.background = '#ffc107'; b.style.color = '#fff'; }
            else if (s === 'accepted') { b.style.background = '#28a745'; b.style.color = '#fff'; }
            else if (s === 'refused') { b.style.background = '#dc3545'; b.style.color = '#fff'; }
        } else {
            b.style.transform = 'scale(1)'; b.style.boxShadow = 'none'; b.style.opacity = '0.5';
            if (s === 'pending') { b.style.background = '#fff8e1'; b.style.color = '#856404'; }
            else if (s === 'accepted') { b.style.background = '#e8f5e9'; b.style.color = '#155724'; }
            else if (s === 'refused') { b.style.background = '#fce4ec'; b.style.color = '#721c24'; }
        }
    });
}

function renderDevisLines() {
    const auto = isAuto();
    let html = '';
    let total = 0; let totalRemise = 0;
    currentDevisLines.forEach((line, i) => {
        const prix = line.priceTTC || 0;
        const remise = line.remise || 0;
        const lineTotal = (line.qty||1) * prix * (1 - remise/100);
        if (remise > 0) totalRemise += (line.qty||1) * prix * remise/100;
        total += lineTotal;
        const isPart = line.lineType === 'part';
        const bg = isPart ? 'background:#fffdf0' : '';
        html += '<div style="display:grid;grid-template-columns:1fr 60px 80px 70px 80px 30px;gap:8px;align-items:center;padding:8px;border:1px solid var(--border);border-radius:6px;margin-bottom:4px;' + bg + '">';
        html += '<div>';
        html += '<input type="text" value="' + escHtml(line.description||'') + '" onchange="currentDevisLines[' + i + '].description=this.value" style="width:100%;font-weight:' + (isPart?'400':'600') + '">';
        if (isPart) html += '<input type="text" value="' + escHtml(line.ref||'') + '" onchange="currentDevisLines[' + i + '].ref=this.value" placeholder="Réf. pièce" style="font-size:0.8em;margin-top:2px;color:#888">';
        html += '</div>';
        html += '<input type="number" value="' + (line.qty||1) + '" min="1" onchange="currentDevisLines[' + i + '].qty=parseFloat(this.value)||1;renderDevisLines()">';
        html += '<input type="number" value="' + prix + '" step="0.01" min="0" onchange="currentDevisLines[' + i + '].priceTTC=parseFloat(this.value)||0;renderDevisLines()">';
        html += '<input type="number" value="' + remise + '" step="1" min="0" max="100" onchange="currentDevisLines[' + i + '].remise=parseFloat(this.value)||0;renderDevisLines()" placeholder="0">';
        html += '<strong style="text-align:right;color:var(--blue)">' + lineTotal.toFixed(2) + ' €</strong>';
        html += '<button class="btn-remove" onclick="currentDevisLines.splice(' + i + ',1);renderDevisLines()">×</button>';
        html += '</div>';
    });
    document.getElementById('devisLinesZone').innerHTML = html;

    let totalsHtml = '<div>Total brut : <strong>' + total.toFixed(2) + ' €</strong></div>';
    if (totalRemise > 0) totalsHtml += '<div style="color:var(--red)">Remise : - ' + totalRemise.toFixed(2) + ' €</div>';
    totalsHtml += '<div style="font-size:1.2em;color:var(--blue);font-weight:700;margin-top:4px">Total : ' + (total).toFixed(2) + ' €</div>';
    if (auto) totalsHtml += '<div style="font-size:0.8em;color:var(--text-light)">TVA non applicable, art. 293 B du CGI</div>';
    document.getElementById('devisTotalsZone').innerHTML = totalsHtml;
}

function saveDevis() {
    const clientId = document.getElementById('dClient').value;
    const vehicleId = document.getElementById('dVehicle').value;
    if (!clientId) return toast('Sélectionnez un client', 'error');

    let total = 0; let totalRemise = 0;
    currentDevisLines.forEach(l => {
        const prix = l.priceTTC || 0;
        const rem = l.remise || 0;
        total += (l.qty||1) * prix * (1 - rem/100);
        if (rem > 0) totalRemise += (l.qty||1) * prix * rem/100;
    });

    const devis = {
        id: editingDevisId || 'dev_' + Date.now(),
        number: document.getElementById('dNum').value,
        date: document.getElementById('dDate').value,
        validite: document.getElementById('dValidite').value,
        clientId: clientId,
        vehicleId: vehicleId,
        kmIn: parseInt(document.getElementById('dKmIn').value) || 0,
        status: document.getElementById('dStatut').value,
        notes: document.getElementById('dNotes').value,
        lines: currentDevisLines.map(l => ({...l})),
        totalTTC: total,
        totalRemise: totalRemise
    };

    if (editingDevisId) {
        const idx = data.devis.findIndex(d => d.id === editingDevisId);
        if (idx >= 0) data.devis[idx] = devis;
    } else {
        data.devis.push(devis);
        data.settings.nextDevisNum = (data.settings.nextDevisNum || 1) + 1;
    }
    saveData();
    closeModal('devisModal');
    renderDevis();
    renderDashboard();
    toast('Devis enregistré', 'success');
}

function deleteDevis(id) {
    if (!confirm('Supprimer ce devis ?')) return;
    data.devis = data.devis.filter(d => d.id !== id);
    saveData();
    renderDevis();
    renderDashboard();
    toast('Devis supprimé', 'info');
}

function convertDevisToInvoice(devisId) {
    const d = data.devis.find(x => x.id === devisId);
    if (!d) return;
    if (!confirm('Convertir ce devis en facture ?\n\nDevis : ' + d.number + '\nMontant : ' + (d.totalTTC||0).toFixed(2) + ' €\n\nUne nouvelle facture sera créée avec les mêmes lignes.')) return;

    // Créer la facture à partir du devis
    const inv = {
        id: 'inv_' + Date.now(),
        number: genNumber(data.settings.prefix, data.settings.nextNum || 1),
        date: new Date().toISOString().split('T')[0],
        clientId: d.clientId,
        vehicleId: d.vehicleId,
        kmIn: d.kmIn || 0,
        kmOut: 0,
        status: 'pending',
        payment: 'Carte bancaire',
        notes: 'Issu du devis ' + d.number + (d.notes ? '\n' + d.notes : ''),
        lines: d.lines.map(l => ({...l})),
        totalTTC: d.totalTTC,
        totalRemise: d.totalRemise,
        totalHT: d.totalTTC,
        totalTVA: 0
    };

    data.invoices.push(inv);
    data.settings.nextNum = (data.settings.nextNum || 1) + 1;

    // Marquer le devis comme facturé
    d.status = 'invoiced';
    d.invoiceNumber = inv.number;

    saveData();
    renderDevis();
    renderInvoices();
    renderDashboard();
    toast('✅ Devis converti en facture ' + inv.number, 'success');

function renderOccasions() {
    if (!data.occasions) data.occasions = [];
    renderVOStock();
    populateVOSelects();
}

function renderVOStock() {
    const filter = document.getElementById('voFilterStatus') ? document.getElementById('voFilterStatus').value : 'all';
    const list = filter === 'all' ? data.occasions : data.occasions.filter(v => v.statut === filter);
    const enStock = data.occasions.filter(v => v.statut === 'stock').length;
    const reserves = data.occasions.filter(v => v.statut === 'reserve').length;
    const vendus = data.occasions.filter(v => v.statut === 'vendu').length;
    const caVO = data.occasions.filter(v => v.statut === 'vendu').reduce((s,v) => s + (parseFloat(v.prixVente)||0), 0);
    const margeVO = data.occasions.filter(v => v.statut === 'vendu').reduce((s,v) => {
        return s + ((parseFloat(v.prixVente)||0) - (parseFloat(v.prixAchat)||0) - (parseFloat(v.frais)||0));
    }, 0);
    const el = document.getElementById('voStats');
    if (el) el.innerHTML = '<div class="stat-card"><div class="stat-value">'+enStock+'</div><div class="stat-label">En stock</div></div><div class="stat-card"><div class="stat-value">'+reserves+'</div><div class="stat-label">Réservés</div></div><div class="stat-card"><div class="stat-value">'+vendus+'</div><div class="stat-label">Vendus</div></div><div class="stat-card"><div class="stat-value">'+caVO.toFixed(2)+' €</div><div class="stat-label">CA Ventes VO</div></div><div class="stat-card"><div class="stat-value" style="color:'+(margeVO>=0?'var(--success)':'var(--danger)')+'">'+margeVO.toFixed(2)+' €</div><div class="stat-label">Marge VO</div></div>';
    const tbody = document.getElementById('voTableBody');
    if (!tbody) return;
    if (list.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-light)">Aucun véhicule occasion</td></tr>'; return; }
    tbody.innerHTML = list.map(v => {
        const sb = v.statut==='vendu'?'<span style="background:#d4edda;color:#155724;padding:3px 10px;border-radius:12px;font-size:0.8em;font-weight:600">Vendu</span>':v.statut==='reserve'?'<span style="background:#fff3cd;color:#856404;padding:3px 10px;border-radius:12px;font-size:0.8em;font-weight:600">Réservé</span>':'<span style="background:#cce5ff;color:#004085;padding:3px 10px;border-radius:12px;font-size:0.8em;font-weight:600">En stock</span>';
        return '<tr><td style="font-weight:600">'+(v.plaque||'-')+'</td><td>'+v.marque+' '+v.modele+(v.version?' <small style="color:var(--text-light)">'+v.version+'</small>':'')+'</td><td>'+(v.annee||(v.dateMEC?new Date(v.dateMEC).getFullYear():'-'))+'</td><td>'+(v.km?parseInt(v.km).toLocaleString('fr-FR')+' km':'-')+'</td><td>'+(v.energie||'-')+'</td><td style="font-weight:700;color:var(--blue)">'+(v.prixVente?parseFloat(v.prixVente).toFixed(2)+' €':'-')+'</td><td>'+sb+'</td><td style="white-space:nowrap"><button class="btn btn-sm btn-outline" onclick="editVO(\''+v.id+'\')">✏️</button> <button class="btn btn-sm btn-danger" onclick="deleteVO(\''+v.id+'\')">🗑️</button></td></tr>';
    }).join('');
}

function populateVOSelects() {
    var opts = '<option value="">-- Sélectionner un véhicule --</option>';
    data.occasions.forEach(function(v) { opts += '<option value="'+v.id+'">'+v.plaque+' — '+v.marque+' '+v.modele+'</option>'; });
    ['voSelAnnonce','voSelFacture','voSelBonCmd','voSelCession'].forEach(function(id) { var el=document.getElementById(id); if(el) el.innerHTML=opts; });
    var cOpts = '<option value="">-- Sélectionner un client --</option>';
    data.clients.forEach(function(c) { cOpts += '<option value="'+c.id+'">'+c.nom+' '+(c.prenom||'')+'</option>'; });
    ['facClientSel','bcClientSel','cesClientSel'].forEach(function(id) { var el=document.getElementById(id); if(el) el.innerHTML=cOpts; });
}

function openVOModal(id) {
    editingVOId = id || null;
    document.getElementById('voModalTitle').textContent = id ? 'Modifier VO' : 'Nouveau Véhicule Occasion';
    populateBrandsVO();
    var fields = ['voPlaque','voVin','voVersion','voCouleur','voDateMEC','voKm','voPuisFiscale','voPrixAchat','voFrais','voPrixVente','voDateCT','voEquipements','voObs','voGarantie','voAnnee','voCylindree','voPuissance','voPuissanceKW','voCylindres','voCodeMoteur','voMotorisation'];
    var selects = ['voMarque','voModele','voCarrosserie','voEnergie','voBoite','voTransmission','voEtat','voCT','voStatut'];
    if (id) {
        var v = data.occasions.find(function(x){return x.id===id;});
        if (v) {
            // Selects
            if (v.marque) { document.getElementById('voMarque').value = v.marque; updateModelsVO(); }
            if (v.modele) { document.getElementById('voModele').value = v.modele; updateMotorList('vo'); }
            if (v.motorisation) document.getElementById('voMotorisation').value = v.motorisation;
            document.getElementById('voCarrosserie').value = v.carrosserie||'';
            document.getElementById('voEnergie').value = v.energie||'';
            document.getElementById('voBoite').value = v.boite||'';
            document.getElementById('voTransmission').value = v.transmission||'';
            document.getElementById('voEtat').value = v.etat||'';
            document.getElementById('voCT').value = v.ct||'';
            document.getElementById('voStatut').value = v.statut||'stock';
            // Inputs
            document.getElementById('voPlaque').value = v.plaque||'';
            document.getElementById('voVin').value = v.vin||'';
            document.getElementById('voVersion').value = v.version||'';
            document.getElementById('voCouleur').value = v.couleur||'';
            document.getElementById('voDateMEC').value = v.dateMEC||'';
            document.getElementById('voKm').value = v.km||'';
            document.getElementById('voPuisFiscale').value = v.puisFiscale||'';
            document.getElementById('voPrixAchat').value = v.prixAchat||'';
            document.getElementById('voFrais').value = v.frais||'';
            document.getElementById('voPrixVente').value = v.prixVente||'';
            document.getElementById('voDateCT').value = v.dateCT||'';
            document.getElementById('voEquipements').value = v.equipements||'';
            document.getElementById('voObs').value = v.obs||'';
            document.getElementById('voGarantie').value = v.garantie||'';
            document.getElementById('voAnnee').value = v.annee||'';
            document.getElementById('voCylindree').value = v.cylindree||'';
            document.getElementById('voPuissance').value = v.puissance||'';
            document.getElementById('voPuissanceKW').value = v.puissanceKW||'';
            document.getElementById('voCylindres').value = v.cylindres||'';
            document.getElementById('voCodeMoteur').value = v.codeMoteur||'';
            document.getElementById('voMotorisation').value = v.motorisation||'';
        }
    } else {
        fields.forEach(function(f){var el=document.getElementById(f);if(el)el.value='';});
        selects.forEach(function(f){var el=document.getElementById(f);if(el)el.value='';});
        document.getElementById('voStatut').value='stock';
        document.getElementById('voModele').innerHTML='<option value="">-- Sélectionner marque --</option>';
        document.getElementById('voMotorSelect').innerHTML='<option value="">-- Sélectionner modèle d\'abord --</option>';
    }
    openModal('voModal');
}
function editVO(id){openVOModal(id);}

function saveVO() {
    var marque=document.getElementById('voMarque').value;
    var modele=document.getElementById('voModele').value;
    if(!marque||!modele)return toast('Marque et Modèle obligatoires','error');
    var vo = {
        id:editingVOId||'vo_'+Date.now(),
        plaque:document.getElementById('voPlaque').value.trim().toUpperCase(),
        vin:document.getElementById('voVin').value.trim().toUpperCase(),
        marque:marque, modele:modele,
        version:document.getElementById('voVersion').value.trim(),
        motorisation:document.getElementById('voMotorisation').value.trim(),
        carrosserie:document.getElementById('voCarrosserie').value,
        couleur:document.getElementById('voCouleur').value.trim(),
        energie:document.getElementById('voEnergie').value,
        boite:document.getElementById('voBoite').value,
        transmission:document.getElementById('voTransmission').value,
        dateMEC:document.getElementById('voDateMEC').value,
        annee:document.getElementById('voAnnee').value,
        km:document.getElementById('voKm').value,
        cylindree:document.getElementById('voCylindree').value,
        puissance:document.getElementById('voPuissance').value,
        puissanceKW:document.getElementById('voPuissanceKW').value,
        cylindres:document.getElementById('voCylindres').value,
        codeMoteur:document.getElementById('voCodeMoteur').value.trim().toUpperCase(),
        puisFiscale:document.getElementById('voPuisFiscale').value,
        prixAchat:document.getElementById('voPrixAchat').value,
        frais:document.getElementById('voFrais').value,
        prixVente:document.getElementById('voPrixVente').value,
        etat:document.getElementById('voEtat').value,
        ct:document.getElementById('voCT').value,
        dateCT:document.getElementById('voDateCT').value,
        equipements:document.getElementById('voEquipements').value.trim(),
        obs:document.getElementById('voObs').value.trim(),
        statut:document.getElementById('voStatut').value,
        garantie:document.getElementById('voGarantie').value.trim()
    };
    if(!data.occasions)data.occasions=[];
    if(editingVOId){var idx=data.occasions.findIndex(function(x){return x.id===editingVOId;});if(idx>=0)data.occasions[idx]=vo;}else{data.occasions.push(vo);}
    saveData();closeModal('voModal');renderAll();toast(editingVOId?'Véhicule modifié':'Véhicule ajouté','success');
}

function deleteVO(id){if(!confirm('Supprimer ce véhicule occasion ?'))return;data.occasions=data.occasions.filter(function(x){return x.id!==id;});saveData();renderAll();toast('Véhicule supprimé','success');}

    var target = btn.getAttribute('data-target');

    container.querySelectorAll('.bc-pay-btn').forEach(function(b) {

function renderURSSAF() {
    const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    const tauxService = data.settings.tauxService || 21.2;
    const tauxVente = data.settings.tauxVente || 12.3;
    const now = new Date();
    const currentMonth = now.getMonth();
    const currentYear = now.getFullYear();

    // Year selector
    const yearSel = document.getElementById('urssafYear');
    const selectedYear = yearSel.value ? parseInt(yearSel.value) : currentYear;
    const years = new Set();
    data.invoices.forEach(inv => { if (inv.date) years.add(new Date(inv.date).getFullYear()); });
    years.add(currentYear - 2); years.add(currentYear - 1); years.add(currentYear); years.add(currentYear + 1);
    const sortedYears = [...years].sort((a,b) => b-a);
    yearSel.innerHTML = sortedYears.map(y => '<option value="'+y+'" '+(y===selectedYear?'selected':'')+'>'+y+'</option>').join('');
    const year = parseInt(yearSel.value) || currentYear;

    // Split CA into services (MO) and vente (pièces) per month
    const caParMois = months.map((m, i) => {
        const paid = data.invoices.filter(inv => {
            if (inv.status !== 'paid' || !inv.date) return false;
            const d = new Date(inv.date);
            return d.getFullYear() === year && d.getMonth() === i;
        });
        let caService = 0; let caVente = 0;
        paid.forEach(inv => {
            if (inv.lines && inv.lines.length > 0) {
                inv.lines.forEach(l => {
                    const prix = l.priceTTC || l.priceHT || 0;
                    const rem = l.remise || 0;
                    const lineTotal = (l.qty||1) * prix * (1 - rem/100);
                    if (l.lineType === 'part') caVente += lineTotal;
                    else caService += lineTotal;
                });
            } else {
                caService += (inv.totalTTC || 0);
            }
        });
        return { mois: m, caService, caVente, caTotal: caService + caVente, nb: paid.length };
    });

    const totalService = caParMois.reduce((s, m) => s + m.caService, 0);
    const totalVente = caParMois.reduce((s, m) => s + m.caVente, 0);
    const totalAnnee = totalService + totalVente;
    const cotisService = totalService * tauxService / 100;
    const cotisVente = totalVente * tauxVente / 100;
    const cotisTotal = cotisService + cotisVente;

    // Trimestres
    const trimData = [0,1,2,3].map(q => {
        const ms = caParMois.slice(q*3, q*3+3);
        const svc = ms.reduce((s,m) => s + m.caService, 0);
        const vte = ms.reduce((s,m) => s + m.caVente, 0);
        return { caService: svc, caVente: vte, caTotal: svc + vte, cotisService: svc*tauxService/100, cotisVente: vte*tauxVente/100, cotisTotal: svc*tauxService/100 + vte*tauxVente/100 };
    });
    const currentTrim = Math.floor(currentMonth / 3);

    // Stats
    const moisCurr = caParMois[currentMonth];
    const trimCurr = trimData[currentTrim];
    document.getElementById('urssafStats').innerHTML = 
        '<div class="stat-card"><div class="stat-value">'+moisCurr.caTotal.toFixed(2)+' €</div><div class="stat-label">CA '+months[currentMonth]+'</div></div>' +
        '<div class="stat-card"><div class="stat-value">'+trimCurr.caTotal.toFixed(2)+' €</div><div class="stat-label">CA T'+(currentTrim+1)+'</div></div>' +
        '<div class="stat-card orange"><div class="stat-value">'+trimCurr.cotisTotal.toFixed(2)+' €</div><div class="stat-label">Cotisations T'+(currentTrim+1)+'</div></div>' +
        '<div class="stat-card green"><div class="stat-value">'+totalAnnee.toFixed(2)+' €</div><div class="stat-label">CA '+year+'</div></div>' +
        '<div class="stat-card red"><div class="stat-value">'+cotisTotal.toFixed(2)+' €</div><div class="stat-label">Cotisations '+year+'</div></div>';

    // Monthly table — avec split service/vente
    document.getElementById('urssafMonthly').innerHTML = caParMois.map((m, i) => {
        const isCurrent = (year === currentYear && i === currentMonth);
        const bg = isCurrent ? 'background:rgba(26,58,122,0.06);font-weight:600' : '';
        const cotisM = m.caService * tauxService/100 + m.caVente * tauxVente/100;
        return '<tr style="'+bg+'">' +
            '<td>'+(isCurrent?'📍 ':'')+m.mois+'</td>' +
            '<td style="text-align:right;color:var(--blue)">'+m.caService.toFixed(2)+' €</td>' +
            '<td style="text-align:right;color:#7c3aed">'+m.caVente.toFixed(2)+' €</td>' +
            '<td style="text-align:right;font-weight:600">'+m.caTotal.toFixed(2)+' €</td>' +
            '<td style="text-align:center">'+m.nb+'</td>' +
            '<td style="text-align:right;color:var(--red)">'+cotisM.toFixed(2)+' €</td>' +
            '<td><div style="background:var(--silver-light);border-radius:4px;height:8px;overflow:hidden"><div style="background:var(--blue);height:100%;width:'+(totalAnnee>0?(m.caTotal/totalAnnee*100):0)+'%;border-radius:4px"></div></div></td>' +
        '</tr>';
    }).join('');

    document.getElementById('urssafTotal').innerHTML = '<tr style="background:#f0f2f5;font-weight:700">' +
        '<td>TOTAL '+year+'</td>' +
        '<td style="text-align:right;color:var(--blue)">'+totalService.toFixed(2)+' €</td>' +
        '<td style="text-align:right;color:#7c3aed">'+totalVente.toFixed(2)+' €</td>' +
        '<td style="text-align:right">'+totalAnnee.toFixed(2)+' €</td>' +
        '<td style="text-align:center">'+caParMois.reduce((s,m)=>s+m.nb,0)+'</td>' +
        '<td style="text-align:right;color:var(--red)">'+cotisTotal.toFixed(2)+' €</td>' +
        '<td></td></tr>';

    // Quarters — avec détail vente/service
    const echeances = ['30 Avril','31 Juillet','31 Octobre','31 Janvier N+1'];
    document.getElementById('urssafTrimestres').innerHTML = [0,1,2,3].map(q => {
        const t = trimData[q];
        const isCurr = (year === currentYear && q === currentTrim);
        return '<div style="padding:20px;border-radius:var(--radius);border:2px solid '+(isCurr?'var(--blue)':'var(--border)')+';background:'+(isCurr?'rgba(26,58,122,0.04)':'var(--card)')+'">'+
            '<div style="font-family:Rajdhani,sans-serif;font-weight:700;font-size:1.1em;color:var(--blue);margin-bottom:8px">'+(isCurr?'📍 ':'')+'T'+(q+1)+' '+year+'</div>'+
            '<div style="font-size:1.4em;font-weight:700;margin-bottom:4px">'+t.caTotal.toFixed(2)+' €</div>'+
            '<div style="font-size:0.8em;margin-bottom:2px">🔧 Services : '+t.caService.toFixed(2)+' € <span style="color:var(--red)">('+t.cotisService.toFixed(2)+' €)</span></div>'+
            '<div style="font-size:0.8em;margin-bottom:6px">⚙️ Ventes : '+t.caVente.toFixed(2)+' € <span style="color:var(--red)">('+t.cotisVente.toFixed(2)+' €)</span></div>'+
            '<div style="font-size:0.95em;color:var(--red);font-weight:700;margin-bottom:8px;padding:6px;background:rgba(196,30,30,0.06);border-radius:4px">Total cotisations : '+t.cotisTotal.toFixed(2)+' €</div>'+
            '<div style="font-size:0.8em;color:var(--text-light)">Échéance : '+echeances[q]+'</div>'+
        '</div>';
    }).join('');

    // Info
    document.getElementById('urssafInfo').innerHTML = 
        '• <strong>Activité mixte garage</strong> — deux taux de cotisation :<br>' +
        '&nbsp;&nbsp;&nbsp;🔧 Prestations de services (main-d\'œuvre) : <strong>'+tauxService+'%</strong><br>' +
        '&nbsp;&nbsp;&nbsp;⚙️ Vente de marchandises (pièces) : <strong>'+tauxVente+'%</strong><br>' +
        '• Taux modifiables dans <strong>Paramètres → Régime fiscal</strong><br>' +
        '• Les calculs se basent sur les <strong>factures payées</strong> uniquement (régime encaissement)<br>' +
        '• BIC services normal : 21.2% | ACRE 1ère année : 10.6%<br>' +
        '• BIC achat-revente normal : 12.3% | ACRE 1ère année : 6.2%<br>' +
        '• Les échéances sont trimestrielles, dernier jour du mois suivant le trimestre<br>' +
        '• Ces estimations sont indicatives — consultez votre expert-comptable';
}

// ============================================================
let cityTimeout;
function autoCity(cp, targetId) {
    clearTimeout(cityTimeout);
    const dd = document.getElementById(targetId + '_dd');
    if (dd) { dd.classList.remove('show'); dd.innerHTML = ''; }
    if (cp.length !== 5) return;
    cityTimeout = setTimeout(async () => {
        try {
            const resp = await fetch('https://geo.api.gouv.fr/communes?codePostal=' + cp + '&fields=nom&limit=20');
            const results = await resp.json();
            if (results.length === 0) return;
            if (results.length === 1) {
                document.getElementById(targetId).value = results[0].nom;
                return;
            }
            // Multiple results: show dropdown
            if (dd) {
                dd.innerHTML = results.map(r =>
                    `<div class="city-option" onclick="selectCity('${targetId}','${r.nom.replace(/'/g,"\\'")}')">${r.nom}</div>`
                ).join('');
                dd.classList.add('show');
            }
        } catch(e) { console.log('autoCity error:', e); }
    }, 300);
}

function selectCity(targetId, name) {
    document.getElementById(targetId).value = name;
    const dd = document.getElementById(targetId + '_dd');
    if (dd) { dd.classList.remove('show'); dd.innerHTML = ''; }
}

// Close city dropdowns on outside click
document.addEventListener('click', function(e) {
    document.querySelectorAll('.city-dropdown.show').forEach(dd => {
        if (!dd.parentElement.contains(e.target)) {
            dd.classList.remove('show');
        }
    });
});

function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showSuggestions(type) {
    const input = document.getElementById(type + 'Search');
    const dropdown = document.getElementById(type + 'Suggestions');
    const q = (input.value || '').toLowerCase();

    if (q.length < 2) { dropdown.classList.remove('active'); return; }

    let items = [];

    if (type === 'client') {
        data.clients.forEach(c => {
            const nom = (c.nom || '').toLowerCase();
            const prenom = (c.prenom || '').toLowerCase();
            const vehs = data.vehicles.filter(v => v.clientId === c.id);
            const plaques = vehs.map(v => (v.plaque || '').toLowerCase());
            if (nom.includes(q) || prenom.includes(q) || (nom + ' ' + prenom).includes(q) || plaques.some(p => p.includes(q))) {
                const plaqTxt = vehs.length ? ' — ' + vehs.map(v => v.plaque).join(', ') : '';
                items.push({ label: '<strong>' + escHtml(c.nom) + '</strong> ' + escHtml(c.prenom) + plaqTxt, value: c.nom + ' ' + c.prenom });
            }
        });
    } else if (type === 'vehicle') {
        data.vehicles.forEach(v => {
            const plaque = (v.plaque || '').toLowerCase();
            const marque = (v.marque || '').toLowerCase();
            const modele = (v.modele || '').toLowerCase();
            const motor = (v.motorisation || '').toLowerCase();
            if (plaque.includes(q) || marque.includes(q) || modele.includes(q) || motor.includes(q)) {
                const client = data.clients.find(c => c.id === v.clientId);
                const cName = client ? client.nom + ' ' + client.prenom : '';
                items.push({ label: '<strong>' + escHtml(v.plaque) + '</strong> ' + escHtml(v.marque) + ' ' + escHtml(v.modele) + (cName ? ' — ' + escHtml(cName) : ''), value: v.plaque });
            }
        });
    } else if (type === 'invoice') {
        data.invoices.forEach(inv => {
            const num = (inv.number || '').toLowerCase();
            const client = data.clients.find(c => c.id === inv.clientId);
            const cName = client ? (client.nom + ' ' + client.prenom).toLowerCase() : '';
            const veh = data.vehicles.find(v => v.id === inv.vehicleId);
            const plaque = veh ? (veh.plaque || '').toLowerCase() : '';
            if (num.includes(q) || cName.includes(q) || plaque.includes(q)) {
                items.push({ label: '<strong>' + escHtml(inv.number) + '</strong> ' + (client ? escHtml(client.nom) + ' ' + escHtml(client.prenom) : '') + (veh ? ' — ' + escHtml(veh.plaque) : ''), value: inv.number });
            }
        });
    }

    if (items.length === 0) { dropdown.classList.remove('active'); return; }

    dropdown.innerHTML = items.slice(0, 8).map(item =>
        `<div class="sugg-item" onclick="document.getElementById('${type}Search').value='${item.value.replace(/'/g,"\\'")}';document.getElementById('${type}Suggestions').classList.remove('active');render${type === 'client' ? 'Clients' : type === 'vehicle' ? 'Vehicles' : 'Invoices'}()">${item.label}</div>`
    ).join('');
    dropdown.classList.add('active');
}

// Fermer les suggestions en cliquant ailleurs
document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-bar')) {
        document.querySelectorAll('.suggestions-dropdown').forEach(d => d.classList.remove('active'));
    }
});

function formatPlaque(el) {
    let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (v.length > 2) v = v.substring(0,2) + '-' + v.substring(2);
    if (v.length > 6) v = v.substring(0,6) + '-' + v.substring(6);
    if (v.length > 9) v = v.substring(0,9);
    el.value = v;
}
function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + (type||'info') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// SECTION LOADER + DEFERRED INIT
// ============================================================
function initApp() {
    // VO Sub-tabs navigation (deferred — buttons loaded from sections/occasions.html)
    document.querySelectorAll('.vo-subtab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.vo-subtab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.vo-sub').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.vosub).classList.add('active');
        });
    });

    // Close modals on overlay click (deferred — modals loaded from sections/modals.html)
    document.querySelectorAll('.modal-overlay').forEach(m => {
        m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); });
    });

    // Init app
    init();
}

(function() {
    const sections = [
        { id: 'sec-dashboard', file: 'dashboard.html' },
        { id: 'sec-clients', file: 'clients.html' },
        { id: 'sec-vehicules', file: 'vehicules.html' },
        { id: 'sec-factures', file: 'factures.html' },
        { id: 'sec-devis', file: 'devis.html' },
        { id: 'sec-operations', file: 'operations.html' },
        { id: 'sec-urssaf', file: 'urssaf.html' },
        { id: 'sec-occasions', file: 'occasions.html' },
        { id: 'sec-settings', file: 'settings.html' },
        { id: 'modals-container', file: 'modals.html' }
    ];
    let loaded = 0;
    sections.forEach(function(s) {
        fetch(s.file).then(r => r.text()).then(html => {
            document.getElementById(s.id).innerHTML = html;
            loaded++;
            if (loaded === sections.length) initApp();
        }).catch(e => console.error('Erreur chargement ' + s.file, e));
    });
})();
</script>
