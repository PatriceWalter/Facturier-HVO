<!DOCTYPE html>

<title>AutoFact Pro — Facturier Atelier</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c:#FFFDF9;--b:#E0D5C5;--br:#5C3D2E;--g:#B8860B;--t:#3D3428;--m:#8C7A65;--l:#F5EDE0;--gn:#1E7F3F;--bl:#3366CC;--rd:#C5221F}
body{font-family:Georgia,serif;color:var(--t);background:linear-gradient(160deg,#FAF7F2,#F0E9DD,#EDE4D4);min-height:100vh}
input,textarea,select,button{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--g)!important;box-shadow:0 0 0 3px rgba(184,134,11,.12)!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media print{.np{display:none!important}}
.bar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:rgba(255,253,249,.92);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:99;flex-wrap:wrap}
.bar h1{flex:1;font-size:15px;font-weight:700;color:var(--br);min-width:160px}
.W{max-width:1060px;margin:0 auto;padding:20px;animation:fadeIn .3s}
.B{padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;border:none;white-space:nowrap;font-family:inherit}.B:hover{opacity:.85}.B:disabled{opacity:.5}
.Bg{background:linear-gradient(135deg,var(--g),#996515);color:#fff}.Bw{background:rgba(92,61,46,.06);border:1.5px solid var(--b);color:#6B5B4E}.Bv{background:linear-gradient(135deg,var(--gn),#166B34);color:#fff}.Bb{background:linear-gradient(135deg,var(--bl),#2952A3);color:#fff}.Bs{background:#E6F4EA;border:1.5px solid #B7DFC4;color:var(--gn)}.Bx{padding:5px 10px;font-size:12px}
.Bd{background:none;border:1.5px solid #E8C4C0;color:var(--rd);border-radius:6px;padding:4px 8px;font-size:13px;font-weight:700;cursor:pointer}
.Ba{background:rgba(184,134,11,.06);border:1.5px dashed #C4A882;color:var(--g);padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;margin-top:5px}
.C{background:var(--c);border:1.5px solid var(--b);border-radius:10px;padding:16px 20px;box-shadow:0 1px 4px rgba(92,61,46,.04);margin-bottom:10px}
.F{background:var(--c);border:1.5px solid var(--b);border-radius:10px;padding:22px}
.G{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.D{display:flex;flex-direction:column;gap:3px}.D label{font-size:10px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:system-ui}
.D input,.D textarea,.D select{background:var(--c);border:1.5px solid var(--b);color:var(--t);padding:8px 11px;border-radius:7px;font-size:14px;width:100%}.D textarea{resize:vertical}
.T{display:flex;gap:2px;border-bottom:2px solid var(--b);margin-bottom:16px;flex-wrap:wrap}
.Tb{background:none;border:none;color:#A89880;padding:8px 13px;cursor:pointer;font-size:13px;font-family:inherit;border-bottom:2px solid transparent}.Tb.a{color:var(--g);font-weight:700;border-bottom-color:var(--g)}
.R{display:flex;gap:7px;align-items:center;margin-bottom:7px}
.I{background:var(--c);border:1.5px solid var(--b);color:var(--t);padding:7px 10px;border-radius:6px;font-size:13px;font-family:inherit}.I:focus{border-color:var(--g)}
.Lt{min-width:80px;text-align:right;font-weight:700;color:var(--br);font-size:13px}
.Gt{text-align:right;font-weight:700;font-size:15px;color:var(--br);margin-top:8px;padding:10px 14px;background:linear-gradient(90deg,var(--l),#EDE4D4);border-radius:7px;border:1.5px solid #D4C8B4}
.Sh{font-size:13px;font-weight:700;color:var(--br);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--g)}
.Pb{background:linear-gradient(135deg,var(--l),#EDE4D4);border:2px solid var(--g);border-radius:10px;padding:16px;margin-bottom:18px}
.Pi{max-width:280px;padding:12px 18px;background:#fff;border:3px solid var(--g);border-radius:10px;font-size:22px;font-weight:800;color:var(--br);text-align:center;text-transform:uppercase;letter-spacing:4px;font-family:system-ui}
.Vr{position:relative}.Vl{position:absolute;top:100%;left:0;right:0;background:var(--c);border:1.5px solid var(--g);border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 6px 16px rgba(92,61,46,.15)}
.Vi{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--b);font-size:13px}.Vi:hover{background:var(--l)}.Vi b{color:var(--br)}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;font-family:system-ui}
.ch{background:var(--l);border:1px solid var(--b);padding:3px 10px;border-radius:5px;font-size:12px;color:#6B5B4E;font-family:system-ui}
.chT{background:linear-gradient(135deg,var(--br),#4A2F22);color:#DAA520;border:none;padding:3px 10px;border-radius:5px;font-size:12px;font-family:system-ui}
.wr{background:#FEF3CD;border:1px solid #F0D78C;border-radius:7px;padding:10px;color:#856404;font-size:12px;line-height:1.5;margin:10px 0}
/* Print */
.Z{background:#FFFDF9;color:var(--t);padding:28px;border-radius:10px;font-size:11px;line-height:1.5;max-width:780px;margin:0 auto;box-shadow:0 4px 14px rgba(92,61,46,.08);border:1px solid var(--b)}
.Z table{width:100%;border-collapse:collapse;margin-bottom:10px}.Z th{background:var(--br);color:#F5EDE0;font-weight:600;border:1px solid var(--br);padding:4px 7px;font-size:10px}.Z td{border:1px solid var(--b);padding:4px 7px;font-size:10px}
.Z .sc{font-size:11px;font-weight:700;color:var(--br);border-bottom:2px solid var(--g);padding-bottom:3px;margin:14px 0 7px;text-transform:uppercase}
.Z .su td{background:var(--l);font-weight:600;color:var(--br)}.Z .to td{background:var(--br);color:#F5EDE0;font-weight:700;border-color:var(--br)}
.Z .gl{color:#DAA520}.Z .al{background:#FAF7F2}.Z .r{text-align:right}.Z .c{text-align:center}.Z .bo{font-weight:700}
.Z .rc{margin-left:auto;width:250px;margin-top:8px}.Z .rc td{border:none;padding:4px 7px}.Z .rc .tt td{background:var(--br);color:#DAA520;font-size:12px;font-weight:700;border:none}
</style>

<body>

<script type="text/babel">
const {useState}=React;
const VDB={"ALFA ROMEO":["Giulia","Stelvio","Tonale"],"ALPINE":["A110","A110 R","A110 S"],"AUDI":["A1","A3","A4","A5","A6","A7","A8","Q2","Q3","Q4 e-tron","Q5","Q7","Q8","e-tron","e-tron GT","TT","RS3","RS4","RS5","RS6","RS Q8","S3","S5"],"BENTLEY":["Continental GT","Flying Spur","Bentayga"],"BMW":["Série 1","Série 2","Série 3","Série 4","Série 5","Série 7","X1","iX1","X2","X3","iX3","X4","X5","X6","X7","iX","i4","i5","i7","Z4","M2","M3","M4","M5"],"BYD":["Atto 3","Han","Seal","Dolphin"],"CITROËN":["C1","C3","C3 Aircross","C4","ë-C4","C4 X","C5 Aircross","C5 X","Berlingo","Jumpy","Jumper","Ami"],"CUPRA":["Born","Formentor","Leon","Tavascan"],"DACIA":["Sandero","Duster","Jogger","Spring","Logan"],"DS":["DS 3","DS 4","DS 7","DS 9"],"FERRARI":["296 GTB","SF90","Roma","Purosangue","812"],"FIAT":["500","500X","500e","Tipo","Panda","Ducato"],"FORD":["Fiesta","Focus","Puma","Kuga","Explorer","Mustang Mach-E","Mustang","Ranger","Transit","Bronco"],"HONDA":["Jazz","Civic","HR-V","CR-V","ZR-V","Honda e"],"HYUNDAI":["i10","i20","i30","Bayon","Kona","Tucson","Santa Fe","Ioniq 5","Ioniq 6"],"ISUZU":["D-Max"],"JAGUAR":["E-Pace","F-Pace","I-Pace","XE","XF","F-Type"],"JEEP":["Renegade","Compass","Avenger","Wrangler","Grand Cherokee"],"KIA":["Picanto","Rio","Ceed","Stonic","Niro","Sportage","Sorento","EV6","EV9"],"LAMBORGHINI":["Huracán","Urus","Revuelto"],"LAND ROVER":["Defender","Discovery","Discovery Sport","Range Rover","Range Rover Sport","Range Rover Velar","Range Rover Evoque"],"LEXUS":["UX","NX","RX","ES","IS","LC","LS","RZ"],"MASERATI":["Ghibli","Levante","MC20","Grecale","GranTurismo"],"MAZDA":["Mazda2","Mazda3","CX-3","CX-30","CX-5","CX-60","MX-5","MX-30"],"MERCEDES":["Classe A","Classe B","Classe C","Classe E","Classe S","CLA","CLE","GLA","GLB","GLC","GLE","GLS","EQA","EQB","EQE","EQS","AMG GT","Classe G","Vito","Sprinter"],"MG":["MG4","MG5","ZS EV","HS"],"MINI":["Cooper","Countryman","Clubman"],"MITSUBISHI":["Space Star","ASX","Eclipse Cross","Outlander","L200"],"NISSAN":["Micra","Juke","Qashqai","X-Trail","Leaf","Ariya","Navara","GT-R"],"OPEL":["Corsa","Astra","Mokka","Grandland","Combo","Vivaro"],"PEUGEOT":["208","e-208","308","e-308","408","508","2008","e-2008","3008","5008","Rifter","Partner","Expert","Boxer"],"POLESTAR":["Polestar 2","Polestar 3"],"PORSCHE":["911","718 Cayman","718 Boxster","Cayenne","Macan","Panamera","Taycan"],"RENAULT":["Clio","Mégane","Mégane E-Tech","Captur","Kadjar","Arkana","Austral","Scénic","Espace","Koleos","Twingo","Zoé","Kangoo","Trafic","Master"],"ROLLS-ROYCE":["Ghost","Phantom","Cullinan","Spectre"],"SEAT":["Ibiza","Leon","Arona","Ateca","Tarraco"],"ŠKODA":["Fabia","Octavia","Superb","Scala","Kamiq","Karoq","Kodiaq","Enyaq"],"SMART":["Fortwo","Forfour","#1"],"SUBARU":["Impreza","Forester","Outback","Solterra","BRZ"],"SUZUKI":["Swift","Ignis","Vitara","S-Cross","Jimny"],"TESLA":["Model 3","Model Y","Model S","Model X"],"TOYOTA":["Yaris","Yaris Cross","Corolla","Corolla Cross","C-HR","RAV4","Highlander","Land Cruiser","Hilux","Proace","GR86","Supra","bZ4X","Aygo X","Prius","Camry"],"VOLKSWAGEN":["Polo","Golf","Golf GTI","Golf R","ID.3","ID.4","ID.5","T-Roc","T-Cross","Tiguan","Touareg","Arteon","Passat","Taigo","Caddy","Transporter","Crafter","Multivan"],"VOLVO":["XC40","C40","XC60","XC90","S60","S90","V60","V90","EX30","EX90"]};
const MRQ=Object.keys(VDB).sort();
const AV=[];MRQ.forEach(m=>VDB[m].forEach(mo=>AV.push({marque:m,modele:mo,s:(m+" "+mo).toLowerCase()})));

async function chercherPlaque(pl,url){
  if(!url)return{ok:false,erreur:"URL du script non configurée. Allez dans Paramètres."};
  try{const r=await fetch(url+(url.includes("?")?"&":"?")+"plaque="+encodeURIComponent(pl));if(!r.ok)return{ok:false,erreur:"HTTP "+r.status};return await r.json()}
  catch(e){return{ok:false,erreur:e.message}}
}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fE=n=>(parseFloat(n)||0).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" \u20AC";
const fH=n=>(parseFloat(n)||0).toFixed(2).replace(".",",")+"\u00A0h";
const LS={g(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}},s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
const NI=()=>({id:uid(),num:"",date:new Date().toISOString().slice(0,10),or:"",status:"brouillon",client:{name:"",addr:"",city:"",tel:"",email:""},vehicle:{marque:"",modele:"",annee:"",finition:"",vin:"",moteur:"",boite:"",km:"",energie:"",couleur:"",immat:""},laborT1:[],laborT2:[],laborT3:[],parts:[],ecoFees:[],checks:[],tvaRate:20,notes:"",tauxT1:78,tauxT2:92,tauxT3:105});
const NL=()=>({id:uid(),op:"",temps:"",taux:""});const NP=()=>({id:uid(),ref:"",desc:"",qty:1,pu:""});const NE=()=>({id:uid(),desc:"",pu:""});const NC=()=>({id:uid(),pt:"",res:""});
const DS={name:"MON ATELIER",sub:"Réparation Automobile",addr:"",city:"",tel:"",email:"",siret:"",tvaIntra:"",ape:"",iban:"",scriptUrl:""};
const SM={brouillon:{l:"Brouillon",bg:"#F3F0EB",fg:"#8C7A65"},envoyee:{l:"Envoyée",bg:"#E8F0FE",fg:"#3366CC"},payee:{l:"Payée",bg:"#E6F4EA",fg:"#1E7F3F"},annulee:{l:"Annulée",bg:"#FCE8E6",fg:"#C5221F"}};
const cT=i=>{const mo=[...(i.laborT1||[]),...(i.laborT2||[]),...(i.laborT3||[])].reduce((s,l)=>s+(parseFloat(l.temps)||0)*(parseFloat(l.taux)||0),0);const p=(i.parts||[]).reduce((s,x)=>s+(parseFloat(x.qty)||0)*(parseFloat(x.pu)||0),0);const e=(i.ecoFees||[]).reduce((s,x)=>s+(parseFloat(x.pu)||0),0);return(mo+p+e)*(1+(i.tvaRate||20)/100)};

function App(){
  const[vw,setVw]=useState("dash"),[inv,setInv]=useState(LS.g("af7-i",[])),[cur,setCur]=useState(null),[shop,setShop]=useState(LS.g("af7-s",DS)),[nn,setNN]=useState(LS.g("af7-n",1)),[sr,setSr]=useState("");
  const sv=(i,s,n)=>{LS.s("af7-i",i);if(s)LS.s("af7-s",s);if(n!==undefined)LS.s("af7-n",n)};
  const creer=()=>{const i=NI(),y=new Date().getFullYear();i.num="FA-"+y+"-"+String(nn).padStart(4,"0");i.or="OR-"+y+"-"+String(nn+1000).padStart(4,"0");const n2=nn+1;setNN(n2);setCur(i);setVw("edit");sv(inv,null,n2)};
  const sauver=f=>{const idx=inv.findIndex(x=>x.id===f.id);const nl=idx>=0?inv.map((x,i)=>i===idx?f:x):[f,...inv];setInv(nl);setCur(f);sv(nl)};
  const suppr=id=>{const nl=inv.filter(x=>x.id!==id);setInv(nl);sv(nl);if(cur&&cur.id===id){setCur(null);setVw("dash")}};
  const dupl=f=>{const d=JSON.parse(JSON.stringify(f));d.id=uid();d.num="FA-"+new Date().getFullYear()+"-"+String(nn).padStart(4,"0");d.date=new Date().toISOString().slice(0,10);d.status="brouillon";const n2=nn+1;setNN(n2);setCur(d);setVw("edit");sv(inv,null,n2)};
  const fl=inv.filter(f=>!sr||[f.num,f.client.name,f.vehicle.marque,f.vehicle.modele,f.vehicle.immat].some(v=>(v||"").toLowerCase().includes(sr.toLowerCase())));
  return<div>
    <div className="bar np"><h1>AutoFact Pro — {vw==="dash"?"Tableau de bord":vw==="edit"?"Édition "+(cur?cur.num:""):vw==="prev"?"Aperçu "+(cur?cur.num:""):"Paramètres"}</h1>
    <button className="B Bw Bx" onClick={()=>setVw("dash")}>Accueil</button><button className="B Bw Bx" onClick={()=>setVw("set")}>Paramètres</button><button className="B Bg" onClick={creer}>+ Nouvelle facture</button></div>
    <div className="W">
      {vw==="dash"&&<Dash inv={fl} all={inv} sr={sr} setSr={setSr} onE={f=>{setCur(f);setVw("edit")}} onP={f=>{setCur(f);setVw("prev")}} onD={suppr} onDu={dupl} onC={creer}/>}
      {vw==="edit"&&cur&&<Edit inv={cur} shop={shop} onS={sauver} onP={f=>{sauver(f);setVw("prev")}} onB={()=>setVw("dash")}/>}
      {vw==="prev"&&cur&&<Prev inv={cur} shop={shop} onB={()=>setVw("edit")} onD={()=>setVw("dash")}/>}

    </div></div>;
}

/* ═══ TABLEAU DE BORD ═══ */
function Dash({inv,all,sr,setSr,onE,onP,onD,onDu,onC}){
  const enc=all.filter(i=>i.status==="payee").reduce((s,i)=>s+cT(i),0),att=all.filter(i=>i.status==="envoyee").reduce((s,i)=>s+cT(i),0);
  return<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:18}}>
      {[{l:"Encaissé",v:fE(enc),c:"var(--gn)"},{l:"En attente",v:fE(att),c:"var(--g)"},{l:"Brouillons",v:all.filter(i=>i.status==="brouillon").length,c:"var(--br)"},{l:"Total",v:all.length,c:"var(--bl)"}].map((s,i)=><div key={i} style={{background:"var(--c)",border:"1.5px solid var(--b)",borderRadius:10,padding:"12px 16px",borderLeft:"4px solid "+s.c}}><div style={{fontSize:10,color:"#A89880",textTransform:"uppercase",letterSpacing:1,fontFamily:"system-ui",fontWeight:600}}>{s.l}</div><div style={{fontSize:20,fontWeight:700,color:s.c,marginTop:3}}>{s.v}</div></div>)}
    </div>
    <div style={{marginBottom:16}}><input style={{width:"100%",padding:"10px 14px",background:"var(--c)",border:"1.5px solid var(--b)",borderRadius:9,fontSize:14}} placeholder="Rechercher : n°, client, véhicule, immatriculation…" value={sr} onChange={e=>setSr(e.target.value)}/></div>
    {inv.length===0?<div style={{textAlign:"center",padding:"50px 0"}}><p style={{color:"var(--m)",marginBottom:16}}>Aucune facture</p><button className="B Bg" onClick={onC}>+ Créer une facture</button></div>
    :inv.map(f=>{const ttc=cT(f),st=SM[f.status]||SM.brouillon;return<div className="C" key={f.id}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:8}}><b style={{fontSize:14,color:"var(--br)"}}>{f.num}</b><span className="badge" style={{background:st.bg,color:st.fg}}>{st.l}</span></div><span style={{fontSize:12,color:"#A89880",fontFamily:"system-ui"}}>{new Date(f.date).toLocaleDateString("fr-FR")}</span></div>
      <div style={{marginBottom:8}}><div style={{fontSize:13,fontWeight:600,color:"var(--br)"}}>{f.client.name||"(client)"}</div><div style={{fontSize:12,color:"var(--m)"}}>{[f.vehicle.marque,f.vehicle.modele,f.vehicle.immat].filter(Boolean).join(" — ")||"(véhicule)"}</div></div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:9,borderTop:"1px solid #EDE4D4"}}><b style={{fontSize:18,color:"var(--g)"}}>{fE(ttc)}</b>
      <div style={{display:"flex",gap:4}}><button className="B Bw Bx" onClick={()=>onE(f)}>Éditer</button><button className="B Bw Bx" onClick={()=>onP(f)}>Voir</button><button className="B Bw Bx" onClick={()=>onDu(f)}>Dupliquer</button><button className="B Bw Bx" style={{color:"var(--rd)"}} onClick={()=>{if(confirm("Supprimer ?"))onD(f.id)}}>Suppr.</button></div></div></div>})}</div>;
}

/* ═══ ÉDITEUR ═══ */
function Edit({inv:init,shop,onS,onP,onB}){
  const[f,sf]=useState(JSON.parse(JSON.stringify(init))),[tab,sTab]=useState("gen"),[dirty,sD]=useState(false),[pL,sPL]=useState(false),[pM,sPM]=useState(""),[pC,sPC]=useState(""),[vs,sVs]=useState(""),[vO,sVO]=useState(false);
  const u=(p,v)=>{sf(prev=>{const n=JSON.parse(JSON.stringify(prev)),pp=p.split(".");let o=n;for(let i=0;i<pp.length-1;i++)o=o[pp[i]];o[pp[pp.length-1]]=v;return n});sD(true)};
  const uL=(lk,id,fi,v)=>{sf(prev=>{const n=JSON.parse(JSON.stringify(prev)),it=n[lk].find(i=>i.id===id);if(it)it[fi]=v;return n});sD(true)};
  const aL=(lk,fac)=>{sf(prev=>{const n=JSON.parse(JSON.stringify(prev)),it=fac();if(lk.startsWith("labor"))it.taux=lk==="laborT1"?prev.tauxT1:lk==="laborT2"?prev.tauxT2:prev.tauxT3;n[lk].push(it);return n});sD(true)};
  const rL=(lk,id)=>{sf(prev=>{const n=JSON.parse(JSON.stringify(prev));n[lk]=n[lk].filter(i=>i.id!==id);return n});sD(true)};
  const doP=async()=>{const pl=(f.vehicle.immat||"").trim();if(!pl||pl.length<4){sPM("Saisissez une plaque valide.");sPC("perr");return}sPL(true);sPM("Interrogation en cours…");sPC("pwt");const res=await chercherPlaque(pl,shop.scriptUrl);sPL(false);if(res&&res.ok){sf(prev=>{const n=JSON.parse(JSON.stringify(prev));["marque","modele","annee","finition","vin","moteur","boite","energie","couleur"].forEach(k=>{if(res[k])n.vehicle[k]=res[k]});return n});sD(true);sPM("Véhicule identifié ! Vérifiez les champs.");sPC("pok")}else{sPM(res?res.erreur||"Non trouvé":"Erreur");sPC("perr")}};
  const pickV=(m,mo)=>{u("vehicle.marque",m);u("vehicle.modele",mo);sVs("");sVO(false)};
  const vR=vs.length>=2?AV.filter(v=>v.s.includes(vs.toLowerCase())).slice(0,12):[];
  const mc=l=>l.reduce((s,x)=>s+(parseFloat(x.temps)||0)*(parseFloat(x.taux)||0),0);
  const m1=mc(f.laborT1),m2=mc(f.laborT2),m3=mc(f.laborT3),mT=m1+m2+m3,pT=f.parts.reduce((s,p)=>s+(parseFloat(p.qty)||0)*(parseFloat(p.pu)||0),0),eT=f.ecoFees.reduce((s,e)=>s+(parseFloat(e.pu)||0),0),ht=mT+pT+eT,ttc=ht*(1+f.tvaRate/100);
  const cM=VDB[f.vehicle.marque]||[];
  return<div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}} className="np">
      <button className="B Bw" onClick={onB}>← Retour</button>

    <div className="T np">{[["gen","Général"],["cli","Client"],["veh","Véhicule"],["mo","Main-d'œuvre"],["pi","Pièces"],["eco","Éco/Frais"],["chk","Contrôles"]].map(([k,l])=><button key={k} className={"Tb"+(tab===k?" a":"")} onClick={()=>sTab(k)}>{l}</button>)}</div>
    <div className="F">

      {tab==="cli"&&<div className="G"><Fd l="Nom / raison sociale" v={f.client.name} c={v=>u("client.name",v)}/><Fd l="Téléphone" v={f.client.tel} c={v=>u("client.tel",v)}/><Fd l="Adresse" v={f.client.addr} c={v=>u("client.addr",v)}/><Fd l="E-mail" v={f.client.email} c={v=>u("client.email",v)}/><Fd l="CP / Ville" v={f.client.city} c={v=>u("client.city",v)}/></div>}
      {tab==="veh"&&<div>
        <div className="Pb"><div style={{fontSize:14,fontWeight:700,color:"var(--br)",marginBottom:3}}>RECHERCHE PAR PLAQUE</div>

          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}><input className="Pi" placeholder="AB-123-CD" value={f.vehicle.immat||""} onChange={e=>u("vehicle.immat",e.target.value.toUpperCase())} onKeyDown={e=>{if(e.key==="Enter")doP()}}/><button className="B Bg" disabled={pL} onClick={doP}>{pL?"Recherche…":"Rechercher"}</button></div>

        <div className="G"><Fd l="Immatriculation" v={f.vehicle.immat} c={v=>u("vehicle.immat",v.toUpperCase())}/><Fd l="Marque" v={f.vehicle.marque} c={v=>u("vehicle.marque",v)}/><Fd l="Modèle" v={f.vehicle.modele} c={v=>u("vehicle.modele",v)}/><Fd l="Année" v={f.vehicle.annee} c={v=>u("vehicle.annee",v)}/><Fd l="Finition" v={f.vehicle.finition} c={v=>u("vehicle.finition",v)}/><Fd l="VIN" v={f.vehicle.vin} c={v=>u("vehicle.vin",v)}/><Fd l="Code moteur" v={f.vehicle.moteur} c={v=>u("vehicle.moteur",v)}/><Fd l="Boîte" v={f.vehicle.boite} c={v=>u("vehicle.boite",v)}/><Fd l="Kilométrage" v={f.vehicle.km} c={v=>u("vehicle.km",v)}/><Fd l="Énergie" v={f.vehicle.energie} c={v=>u("vehicle.energie",v)}/><Fd l="Couleur" v={f.vehicle.couleur} c={v=>u("vehicle.couleur",v)}/></div></div>}
      {tab==="mo"&&<div><MS t="T1 — Entretien / mécanique rapide" lk="laborT1" items={f.laborT1} tot={m1} uL={uL} aL={aL} rL={rL}/><MS t="T2 — Mécanique lourde" lk="laborT2" items={f.laborT2} tot={m2} uL={uL} aL={aL} rL={rL}/><MS t="T3 — Haute technicité / diagnostic" lk="laborT3" items={f.laborT3} tot={m3} uL={uL} aL={aL} rL={rL}/><div className="Gt">TOTAL MAIN-D'ŒUVRE HT : {fE(mT)}</div></div>}
      {tab==="pi"&&<div><div className="Sh">Pièces et fluides</div>{f.parts.map(p=><div key={p.id} className="R"><input className="I" style={{width:100}} placeholder="Réf." value={p.ref} onChange={e=>uL("parts",p.id,"ref",e.target.value)}/><input className="I" style={{flex:1}} placeholder="Désignation" value={p.desc} onChange={e=>uL("parts",p.id,"desc",e.target.value)}/><input className="I" style={{width:48}} type="number" placeholder="Qté" value={p.qty} onChange={e=>uL("parts",p.id,"qty",e.target.value)}/><input className="I" style={{width:80}} type="number" step="0.01" placeholder="P.U." value={p.pu} onChange={e=>uL("parts",p.id,"pu",e.target.value)}/><span className="Lt">{fE((parseFloat(p.qty)||0)*(parseFloat(p.pu)||0))}</span><button className="Bd" onClick={()=>rL("parts",p.id)}>×</button></div>)}<button className="Ba" onClick={()=>aL("parts",NP)}>+ Pièce</button><div className="Gt">TOTAL PIÈCES HT : {fE(pT)}</div></div>}
      {tab==="eco"&&<div><div className="Sh">Frais environnementaux</div>{f.ecoFees.map(e=><div key={e.id} className="R"><input className="I" style={{flex:1}} placeholder="Désignation" value={e.desc} onChange={ev=>uL("ecoFees",e.id,"desc",ev.target.value)}/><input className="I" style={{width:90}} type="number" step="0.01" placeholder="HT €" value={e.pu} onChange={ev=>uL("ecoFees",e.id,"pu",ev.target.value)}/><button className="Bd" onClick={()=>rL("ecoFees",e.id)}>×</button></div>)}<button className="Ba" onClick={()=>aL("ecoFees",NE)}>+ Frais</button><div className="Gt">TOTAL FRAIS HT : {fE(eT)}</div></div>}
      {tab==="chk"&&<div><div className="Sh">Check-list sécurité</div>{f.checks.map(c=><div key={c.id} className="R"><input className="I" style={{flex:1}} placeholder="Point de contrôle" value={c.pt} onChange={e=>uL("checks",c.id,"pt",e.target.value)}/><input className="I" style={{flex:1}} placeholder="Résultat" value={c.res} onChange={e=>uL("checks",c.id,"res",e.target.value)}/><button className="Bd" onClick={()=>rL("checks",c.id)}>×</button></div>)}<button className="Ba" onClick={()=>aL("checks",NC)}>+ Contrôle</button></div>}
    </div></div>;
}
function MS({t,lk,items,tot,uL,aL,rL}){return<div style={{marginBottom:22}}><div className="Sh">{t}</div>{items.map(l=><div key={l.id} className="R"><input className="I" style={{flex:1}} placeholder="Opération" value={l.op} onChange={e=>uL(lk,l.id,"op",e.target.value)}/><input className="I" style={{width:60}} type="number" step="0.05" placeholder="h" value={l.temps} onChange={e=>uL(lk,l.id,"temps",e.target.value)}/><input className="I" style={{width:65}} type="number" step="0.5" placeholder="€/h" value={l.taux} onChange={e=>uL(lk,l.id,"taux",e.target.value)}/><span className="Lt">{fE((parseFloat(l.temps)||0)*(parseFloat(l.taux)||0))}</span><button className="Bd" onClick={()=>rL(lk,l.id)}>×</button></div>)}<button className="Ba" onClick={()=>aL(lk,NL)}>+ Ajouter</button><div style={{textAlign:"right",color:"var(--m)",fontSize:11,marginTop:3}}>Sous-total : {fE(tot)}</div></div>}
function Fd({l,v,c,t,ml}){return<div className="D"><label>{l}</label>{ml?<textarea value={v!=null?v:""} onChange={e=>c(e.target.value)} rows={3}/>:<input type={t||"text"} value={v!=null?v:""} onChange={e=>c(e.target.value)}/>}</div>}

/* ═══ PARAMÈTRES ═══ */
function Sett({shop,onS}){const[s,ss]=useState({...shop}),[ok,so]=useState(false);const u=(k,v)=>{ss(p=>({...p,[k]:v}));so(false)};

    <div className="F"><div className="Sh">Script de recherche par plaque (Google Apps Script)</div>

/* ═══ APERÇU / IMPRESSION ═══ */
function Prev({inv:f,shop,onB,onD}){
  const aM=[...(f.laborT1||[]),...(f.laborT2||[]),...(f.laborT3||[])],mT=aM.reduce((s,l)=>s+(parseFloat(l.temps)||0)*(parseFloat(l.taux)||0),0),pT=(f.parts||[]).reduce((s,p)=>s+(parseFloat(p.qty)||0)*(parseFloat(p.pu)||0),0),eT=(f.ecoFees||[]).reduce((s,e)=>s+(parseFloat(e.pu)||0),0),ht=mT+pT+eT,tva=ht*(f.tvaRate/100),ttc=ht+tva,tH=aM.reduce((s,l)=>s+(parseFloat(l.temps)||0),0);
  const pr=()=>{const el=document.getElementById("pz");if(!el)return;const w=window.open("","_blank");w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+f.num+'</title><style>@page{size:A4;margin:14mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;font-size:10px;color:#3D3428;line-height:1.4}table{width:100%;border-collapse:collapse}th,td{padding:4px 7px;text-align:left;font-size:10px}th{background:#5C3D2E;color:#F5EDE0;font-weight:600;border:1px solid #5C3D2E}td{border:1px solid #E0D5C5}.sc{font-size:11px;font-weight:700;color:#5C3D2E;border-bottom:2px solid #B8860B;padding-bottom:3px;margin:14px 0 7px;text-transform:uppercase}.su td{background:#F5EDE0;font-weight:600;color:#5C3D2E}.to td{background:#5C3D2E;color:#F5EDE0;font-weight:700;border-color:#5C3D2E}.gl{color:#DAA520}.al{background:#FAF7F2}.r{text-align:right}.c{text-align:center}.bo{font-weight:700}.rc{margin-left:auto;width:250px;margin-top:8px}.rc td{border:none;padding:4px 7px}.tt td{background:#5C3D2E;color:#DAA520;font-size:12px;font-weight:700;border:none}</style></head><body>'+el.innerHTML+'</body></html>');w.document.close();setTimeout(()=>w.print(),400)};
  const mb=(titre,items)=>{if(!items||!items.length)return null;return<>{[<tr key={"s"+titre} className="su"><td colSpan={4}>{titre}</td></tr>,...items.map((l,i)=>{const t=(parseFloat(l.temps)||0)*(parseFloat(l.taux)||0);return<tr key={l.id||i} className={i%2?"al":""}><td>{l.op}</td><td className="c">{fH(l.temps)}</td><td className="r">{fE(l.taux)}</td><td className="r">{fE(t)}</td></tr>})]}</>};
  const vc={fontWeight:600,background:"#F5EDE0",width:"15%"},vv={width:"35%"};
  return<div>
    <div style={{display:"flex",gap:7,marginBottom:16}} className="np"><button className="B Bw" onClick={onB}>← Éditer</button><button className="B Bw" onClick={onD}>Accueil</button><div style={{flex:1}}/><button className="B Bg" onClick={pr}>Imprimer / PDF</button></div>
    <div id="pz" className="Z">
      <div style={{display:"flex",justifyContent:"space-between",paddingBottom:10,marginBottom:14,borderBottom:"3px solid #B8860B"}}><div><div style={{fontSize:14,fontWeight:700,color:"#5C3D2E",letterSpacing:2}}>{shop.name}</div><div style={{fontSize:9,color:"#B8860B",fontStyle:"italic"}}>{shop.sub}</div><div style={{fontSize:9,color:"#6B5B4E",marginTop:4,lineHeight:1.5}}>{shop.addr}<br/>{shop.city}<br/>{shop.tel} — {shop.email}</div></div><div style={{textAlign:"right"}}><div style={{fontWeight:700,fontSize:10,color:"#5C3D2E",marginBottom:2}}>CLIENT</div><div style={{fontWeight:700,fontSize:11}}>{f.client.name}</div><div style={{fontSize:9,color:"#6B5B4E",lineHeight:1.5}}>{f.client.addr}<br/>{f.client.city}<br/>{f.client.tel}</div></div></div>
      <div style={{textAlign:"center",marginBottom:14,padding:"8px 0",border:"2px solid #B8860B",background:"linear-gradient(to right,#FAF7F2,#F5EDE0,#FAF7F2)"}}><h1 style={{fontSize:17,color:"#5C3D2E",letterSpacing:3,marginBottom:1}}>FACTURE D'INTERVENTION</h1><p style={{color:"#B8860B",fontSize:10}}>N° {f.num} | {new Date(f.date).toLocaleDateString("fr-FR")} | O.R. {f.or}</p></div>
      <div className="sc">Véhicule</div>
      <table><tbody>{[[["Marque",f.vehicle.marque],["Modèle",f.vehicle.modele]],[["Année",f.vehicle.annee],["Finition",f.vehicle.finition]],[["VIN",f.vehicle.vin],["Immat.",f.vehicle.immat]],[["Moteur",f.vehicle.moteur],["Boîte",f.vehicle.boite]],[["Km",f.vehicle.km],["Énergie",f.vehicle.energie]],[["Couleur",f.vehicle.couleur],["",""]]].map((r,i)=><tr key={i}><td style={vc}>{r[0][0]}</td><td style={vv}>{r[0][1]}</td><td style={vc}>{r[1][0]}</td><td style={vv}>{r[1][1]}</td></tr>)}</tbody></table>
      {aM.length>0&&<><div className="sc">Main-d'œuvre</div><table><thead><tr><th>Opération</th><th style={{width:50}} className="c">Temps</th><th style={{width:65}} className="r">Taux</th><th style={{width:65}} className="r">Total HT</th></tr></thead><tbody>{mb("T1 — Entretien",f.laborT1)}{mb("T2 — Mécanique lourde",f.laborT2)}{mb("T3 — Diagnostic",f.laborT3)}<tr className="to"><td colSpan={3} className="r">Sous-total MO ({fH(tH)})</td><td className="r gl">{fE(mT)}</td></tr></tbody></table></>}
      {f.parts.length>0&&<><div className="sc">Pièces</div><table><thead><tr><th style={{width:75}}>Réf.</th><th>Désignation</th><th style={{width:30}} className="c">Qté</th><th style={{width:60}} className="r">P.U.</th><th style={{width:60}} className="r">Total</th></tr></thead><tbody>{f.parts.map((p,i)=><tr key={p.id||i} className={i%2?"al":""}><td style={{fontSize:9}}>{p.ref}</td><td>{p.desc}</td><td className="c">{p.qty}</td><td className="r">{fE(p.pu)}</td><td className="r">{fE((parseFloat(p.qty)||0)*(parseFloat(p.pu)||0))}</td></tr>)}<tr className="to"><td colSpan={4} className="r">Sous-total pièces</td><td className="r gl">{fE(pT)}</td></tr></tbody></table></>}
      {f.ecoFees.length>0&&<><div className="sc">Frais</div><table><thead><tr><th>Désignation</th><th style={{width:60}} className="r">HT</th></tr></thead><tbody>{f.ecoFees.map((e,i)=><tr key={e.id||i} className={i%2?"al":""}><td>{e.desc}</td><td className="r">{fE(e.pu)}</td></tr>)}<tr className="to"><td className="r">Sous-total frais</td><td className="r gl">{fE(eT)}</td></tr></tbody></table></>}
      <div className="sc">Récapitulatif</div><table className="rc"><tbody><tr><td className="bo">Total MO HT</td><td className="r">{fE(mT)}</td></tr><tr><td className="bo">Total pièces HT</td><td className="r">{fE(pT)}</td></tr>{eT>0&&<tr><td className="bo">Total frais HT</td><td className="r">{fE(eT)}</td></tr>}<tr style={{borderTop:"2px solid #B8860B"}}><td className="bo">BASE HT</td><td className="r bo">{fE(ht)}</td></tr><tr><td>TVA {f.tvaRate} %</td><td className="r">{fE(tva)}</td></tr><tr className="tt"><td>NET À PAYER TTC</td><td className="r">{fE(ttc)}</td></tr></tbody></table>
      {f.checks.length>0&&<><div className="sc">Contrôles</div><table><thead><tr><th>Point</th><th>Résultat</th></tr></thead><tbody>{f.checks.map((c,i)=><tr key={c.id||i} className={i%2?"al":""}><td className="bo">{c.pt}</td><td>{c.res}</td></tr>)}</tbody></table></>}
      {f.notes&&<div style={{marginTop:10,padding:8,background:"#FAF7F2",borderRadius:4,fontSize:10,border:"1px solid #E0D5C5"}}><b>Notes :</b> {f.notes}</div>}
      <div style={{marginTop:16,paddingTop:6,borderTop:"1px solid #E0D5C5",fontSize:8,color:"#A89880",textAlign:"center"}}>{shop.name} — {shop.addr} — {shop.city} | SIRET : {shop.siret} | TVA : {shop.tvaIntra} | APE : {shop.ape}</div>
      <div style={{marginTop:20}}><b style={{color:"#5C3D2E",fontSize:10}}>Bon pour accord — Signature :</b><div style={{height:40,borderBottom:"1px solid #D4C8B4",marginTop:25}}><span style={{fontSize:9,color:"#A89880"}}>Date :{"                              "}Signature :</span></div></div>
    </div></div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
