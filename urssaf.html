<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HVO - URSSAF</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head><body>
<div id="app"><div id="navContainer"></div>
<div class="app-content">
  <div class="card">
    <div class="card-title">🏛️ Déclarations URSSAF</div>
    <div class="form-row">
      <div class="form-group"><label>Régime</label><select id="urssafRegime" onchange="renderURSSAF()"><option value="auto">Auto-entrepreneur</option><option value="micro">Micro-entreprise</option></select></div>
      <div class="form-group"><label>Taux (%)</label><input id="urssafTaux" type="number" step="0.1" value="23.1" onchange="renderURSSAF()"></div>
    </div>
    <div class="form-row" style="margin-bottom:16px">
      <div class="form-group"><label>Période</label><select id="urssafPeriod" onchange="renderURSSAF()"><option value="month">Mensuel</option><option value="quarter">Trimestriel</option></select></div>
      <div class="form-group"><label>Année</label><select id="urssafYear" onchange="renderURSSAF()"></select></div>
    </div>
    <div id="urssafContent"></div>
  </div>
</div></div>
<div class="toast" id="toast"></div>
<script src="js/data.js"></script><script src="js/shared.js"></script>
<script>
if(!isLoggedIn()){window.location.href='index.html';}
initData(function(){buildNav('urssaf');
  const ys=document.getElementById('urssafYear');const years=[...new Set(data.invoices.map(i=>new Date(i.date).getFullYear()))].sort().reverse();
  if(!years.length)years.push(new Date().getFullYear());
  ys.innerHTML=years.map(y=>'<option value="'+y+'">'+y+'</option>').join('');
  renderURSSAF();
});
function renderURSSAF(){
  const taux=parseFloat(document.getElementById('urssafTaux')?.value)||23.1;
  const period=document.getElementById('urssafPeriod')?.value||'month';
  const year=parseInt(document.getElementById('urssafYear')?.value)||new Date().getFullYear();
  const paid=data.invoices.filter(i=>i.status==='payee'&&new Date(i.date).getFullYear()===year);
  let html='<table><thead><tr><th>Période</th><th>CA HT</th><th>CA TTC</th><th>URSSAF ('+taux+'%)</th><th>Net</th></tr></thead><tbody>';
  const periods=period==='month'?12:4;let tCA=0,tU=0;
  for(let p=0;p<periods;p++){
    let pi,label;
    if(period==='month'){pi=paid.filter(i=>new Date(i.date).getMonth()===p);label=new Date(year,p).toLocaleString('fr',{month:'long'});}
    else{const sm=p*3;pi=paid.filter(i=>{const m=new Date(i.date).getMonth();return m>=sm&&m<sm+3;});label='T'+(p+1);}
    const caHT=pi.reduce((s,i)=>s+(i.totalHT||0),0);const caTTC=pi.reduce((s,i)=>s+(i.totalTTC||0),0);
    const u=caHT*taux/100;const net=caHT-u;tCA+=caHT;tU+=u;
    html+='<tr><td>'+label+'</td><td>'+caHT.toFixed(2)+' €</td><td>'+caTTC.toFixed(2)+' €</td><td style="color:var(--danger)">'+u.toFixed(2)+' €</td><td style="color:var(--success);font-weight:700">'+net.toFixed(2)+' €</td></tr>';
  }
  html+='<tr style="font-weight:700;background:var(--silver-light)"><td>TOTAL '+year+'</td><td>'+tCA.toFixed(2)+' €</td><td></td><td style="color:var(--danger)">'+tU.toFixed(2)+' €</td><td style="color:var(--success)">'+(tCA-tU).toFixed(2)+' €</td></tr>';
  html+='</tbody></table>';document.getElementById('urssafContent').innerHTML=html;
}
</script></body></html>
